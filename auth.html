<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>TradeOS — Signing in</title>
  <link rel="manifest" href="/tradeos/manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 24px;
      animation: bounce 0.6s ease-out;
    }

    .branding {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 40px;
      letter-spacing: -1px;
    }

    .branding span {
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 40px 20px;
      margin-top: 20px;
    }

    .status-icon {
      font-size: 48px;
      margin-bottom: 16px;
      animation: spin 2s linear infinite;
    }

    .status-icon.done {
      animation: none;
    }

    .status-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-sub {
      font-size: 14px;
      color: #aaa;
    }

    @keyframes bounce {
      0% {
        transform: scale(0.3) translateY(-100px);
        opacity: 0;
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    .spinner {
      display: inline-block;
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 107, 107, 0.2);
      border-top: 4px solid #ff6b6b;
      border-right: 4px solid #ffd93d;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .checkmark {
      display: inline-block;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1s ease-in-out infinite;
    }

    .checkmark::after {
      content: '✓';
      color: white;
      font-size: 32px;
      font-weight: bold;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .error .status-icon {
      animation: none;
    }

    .error .status-text {
      color: #ef4444;
      background: none;
      -webkit-text-fill-color: unset;
    }

    .error .status-sub {
      color: #ef4444;
    }

    .retry-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .retry-link:hover {
      background: rgba(255, 255, 255, 0.18);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">O_O</div>
    <div class="branding">Trade<span>OS</span></div>

    <div class="status-container" id="status-container">
      <div class="status-icon" id="status-icon">
        <div class="spinner"></div>
      </div>
      <div class="status-text" id="status">Signing you in...</div>
      <div class="status-sub" id="sub">Please wait while we authenticate</div>
      <a href="/tradeos/login.html" class="retry-link" id="retry-link" style="display:none">Back to Sign In</a>
    </div>
  </div>

  <script>
    function updateStatus(icon, text, subtext, isError = false) {
      const container = document.getElementById('status-container');
      const iconEl = document.getElementById('status-icon');
      const statusEl = document.getElementById('status');
      const subEl = document.getElementById('sub');
      const retryLink = document.getElementById('retry-link');

      iconEl.innerHTML = icon;
      statusEl.textContent = text;
      subEl.textContent = subtext;

      if (isError) {
        container.classList.add('error');
        retryLink.style.display = 'inline-block';
      } else {
        container.classList.remove('error');
        retryLink.style.display = 'none';
      }
    }

    async function handleCallback() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var error = params.get('error');
      var state = params.get('state');

      if (error) {
        updateStatus('❌', 'Authentication Failed', error, true);
        return;
      }

      if (!code) {
        window.location.href = '/tradeos/login.html';
        return;
      }

      // Check if this is a Schwab callback (state matches what we stored)
      var schwabState = sessionStorage.getItem('schwab_state');
      if (state && schwabState && state === schwabState) {
        sessionStorage.removeItem('schwab_state');
        await handleSchwabCallback(code);
        return;
      }

      // Otherwise handle as Google OAuth
      await handleGoogleCallback(code);
    }

    async function handleSchwabCallback(code) {
      updateStatus('<div class="spinner"></div>', 'Connecting Schwab', 'Linking your broker account...');
      try {
        var idToken = localStorage.getItem('id_token');
        console.log('🔐 Schwab callback - id_token exists:', !!idToken);
        
        var url = 'https://tradeos-proxy.gordon-foustiii.workers.dev/schwab/callback?code=' + encodeURIComponent(code);
        console.log('📡 Calling Schwab endpoint:', url);
        
        var res = await fetch(url, {
          headers: { 'Authorization': 'Bearer ' + (idToken || '') }
        });
        
        console.log('📊 Response status:', res.status);
        
        if (!res.ok) {
          var errorText = await res.text();
          console.error('❌ Schwab error:', errorText);
          updateStatus('❌', 'Schwab Connection Failed', 'Status ' + res.status, true);
          return;
        }
        
        var data = await res.json();
        console.log('✅ Schwab response:', data);
        
        if (data.ok) {
          updateStatus('<div class="checkmark"></div>', 'Schwab Connected!', 'Redirecting to profile...');
          setTimeout(function() { window.location.href = '/tradeos/settings.html'; }, 1200);
        } else {
          updateStatus('❌', 'Schwab Connection Failed', data.error || 'Unknown error', true);
        }
      } catch(e) {
        console.error('❌ Exception in handleSchwabCallback:', e);
        updateStatus('❌', 'Connection Error', e.message, true);
      }
    }

    async function handleGoogleCallback(code) {
      try {
        console.log('🔐 Starting Google callback with code:', code.substring(0, 20) + '...');
        updateStatus('<div class="spinner"></div>', 'Verifying', 'Exchanging code for tokens...');
        
        var url = 'https://tradeos-proxy.gordon-foustiii.workers.dev/auth/callback?code=' + encodeURIComponent(code);
        console.log('📡 Calling Worker:', url);
        
        var res = await fetch(url);
        console.log('📊 Worker response status:', res.status);
        
        if (!res.ok) {
          var errorText = await res.text();
          console.error('❌ Worker error response:', errorText);
          updateStatus('❌', 'Worker Error', 'Status ' + res.status + ': Check console', true);
          return;
        }

        var data = await res.json();
        console.log('✅ Worker returned:', Object.keys(data));

        if (data.id_token) {
          console.log('✅ id_token received, storing tokens...');
          localStorage.setItem('id_token', data.id_token);
          localStorage.setItem('tradeos_id_token', data.id_token);
          localStorage.setItem('tradeos_access_token', data.access_token || '');
          localStorage.setItem('tradeos_token_expiry', Date.now() + ((data.expires_in || 3600) * 1000));
          
          console.log('✅ Tokens stored, redirecting...');
          updateStatus('<div class="checkmark"></div>', 'Signed In!', 'Redirecting to dashboard...');
          setTimeout(function() { window.location.href = '/tradeos/dashboard.html'; }, 1200);
        } else {
          console.error('❌ No id_token in response:', data);
          updateStatus('❌', 'Sign In Failed', data.error || 'No token in response', true);
        }
      } catch(e) {
        console.error('❌ Exception in handleGoogleCallback:', e);
        updateStatus('❌', 'Connection Error', e.message, true);
      }
    }

    handleCallback();
  </script>
</body>
</html>
