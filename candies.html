<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>TradeOS — Candies</title>
  <link rel="manifest" href="/tradeos/manifest.json">
  <link rel="stylesheet" href="/tradeos/css/app.css">

</head>
<script src="/tradeos/js/muninn-widget.js"></script>
<body>
  <div class="topbar">
    <div class="topbar-brand">Trade<span>OS</span></div>
  </div>

  <div class="container">
    <div class="page-header">
      <div class="page-title">Candies</div>
      <div class="page-sub">Each candy = one trade.</div>
    </div>

    <div class="metric-grid" id="summary"></div>

    <div class="filter-row" id="filter-row">
      <button class="fb active" onclick="setFilter('all',this)">All</button>
      <button class="fb" onclick="setFilter('win',this)">Wins</button>
      <button class="fb" onclick="setFilter('loss',this)">Losses</button>
    </div>
    <div class="filter-row" id="sort-row">
      <button class="fb active" data-sort="date" onclick="setSort('date',this)">Date</button>
      <button class="fb" data-sort="pnl" onclick="setSort('pnl',this)">P&L ↓</button>
      <button class="fb" data-sort="captured" onclick="setSort('captured',this)">Captured</button>
      <button class="fb" data-sort="left" onclick="setSort('left',this)">Left on table</button>
    </div>

    <div id="candies-container"><div class="loading">Loading candies...</div></div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Trade Detail Modal -->
  <div id="trade-modal" onclick="if(event.target===this)closeModal()" style="display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 0 40px">
    <div style="max-width:480px;margin:0 auto;padding:0 16px">
      <div style="background:#1a1a2e;border-radius:16px;border:1px solid rgba(255,255,255,0.08);overflow:hidden">
        <div id="modal-header" style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)">
          <div style="display:flex;align-items:center;gap:10px">
            <div id="modal-ticker" style="font-size:22px;font-weight:900;letter-spacing:-0.5px;color:#e8e8f0;flex-shrink:0"></div>
            <div id="modal-pills" style="display:flex;align-items:center;gap:5px;flex-shrink:0"></div>
            <div id="modal-pnl" style="font-size:20px;font-weight:800;margin-left:auto;flex-shrink:0"></div>
            <button id="grade-btn" onclick="autoGrade()" style="background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);color:#f4b942;padding:6px 8px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg></button>
            <button id="edit-btn" onclick="openEditForm()" style="background:rgba(127,90,240,0.15);border:1px solid rgba(127,90,240,0.3);color:#7f5af0;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0">Edit</button>
            <button onclick="closeModal()" style="background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.6);width:32px;height:32px;border-radius:8px;font-size:18px;cursor:pointer;font-family:inherit;line-height:1;padding:0;flex-shrink:0">×</button>
          </div>
          <div id="modal-date" style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:6px"></div>
        </div>
        <!-- Chart -->
        <div id="modal-tv-chart" style="padding:6px 20px 0">
          <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">
            <span>Chart — Daily</span>
          </div>
          <div style="border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);background:#131722">
            <img id="finviz-chart" style="width:100%;height:auto;display:block;filter:invert(1) hue-rotate(180deg)" />
            <div id="chart-err" style="display:none;color:rgba(255,255,255,0.3);font-size:12px;padding:40px 20px;text-align:center">Chart unavailable for this ticker</div>
          </div>
          <div style="text-align:right;margin-top:2px">
            <a id="tv-link" href="#" target="_blank" rel="noopener" style="font-size:10px;color:rgba(255,255,255,0.25);text-decoration:none">Open in TradingView ↗</a>
          </div>
        </div>

        <div id="modal-candle" style="padding:10px 20px 0"></div>

        <div id="modal-stats" style="padding:6px 20px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"></div>
        <div id="modal-body" style="padding:0 20px 24px;display:flex;flex-direction:column;gap:10px"></div>

        <!-- Auto Grade Result -->
        <div id="grade-result" style="display:none;padding:0 20px 20px">
          <div style="background:rgba(244,185,66,0.08);border:1px solid rgba(244,185,66,0.2);border-radius:12px;padding:14px 16px">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.06em">Muninn's Grade</div>
              <div id="grade-letter" style="font-size:20px;font-weight:900;color:#f4b942;margin-left:auto"></div>
            </div>
            <div id="grade-reasoning" style="font-size:13px;color:rgba(255,255,255,0.7);line-height:1.6"></div>
            <button id="grade-save-btn" onclick="saveGrade()" style="display:none;margin-top:12px;width:100%;padding:10px;background:rgba(244,185,66,0.15);border:1px solid rgba(244,185,66,0.3);color:#f4b942;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Save Grade to Journal</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Trade Modal -->
  <div id="edit-modal" onclick="if(event.target===this)closeEditModal()" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.85);backdrop-filter:blur(4px);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 0 40px">
    <div style="max-width:480px;margin:0 auto;padding:0 16px">
      <div style="background:#1a1a2e;border-radius:16px;border:1px solid rgba(255,255,255,0.08);overflow:hidden">
        <div style="padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:16px;font-weight:800;color:#e8e8f0">Edit Trade — <span id="edit-ticker-label"></span></div>
          <button onclick="closeEditModal()" style="background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.6);width:34px;height:34px;border-radius:8px;font-size:20px;cursor:pointer;font-family:inherit;line-height:1;padding:0">×</button>
        </div>
        <div style="padding:16px 20px;display:flex;flex-direction:column;gap:12px">

          <div style="font-size:11px;font-weight:700;color:#7f5af0;text-transform:uppercase;letter-spacing:.08em">Price Data</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="field"><label>Entry $</label><input id="e-entry" type="number" step="0.01"></div>
            <div class="field"><label>Exit $</label><input id="e-exit" type="number" step="0.01"></div>
            <div class="field"><label>HOD $</label><input id="e-hod" type="number" step="0.01"></div>
            <div class="field"><label>LOD $</label><input id="e-lod" type="number" step="0.01"></div>
            <div class="field"><label>Shares</label><input id="e-shares" type="number"></div>
            <div class="field"><label>Duration</label><input id="e-duration" placeholder="45 min"></div>
          </div>

          <div style="font-size:11px;font-weight:700;color:#7f5af0;text-transform:uppercase;letter-spacing:.08em;margin-top:4px">Trade Details</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="field"><label>Catalyst</label><input id="e-catalyst"></div>
            <div class="field"><label>Float</label><input id="e-float"></div>
            <div class="field"><label>Rel Volume</label><input id="e-relvol"></div>
            <div class="field"><label>Stop Loss $</label><input id="e-stoploss" type="number" step="0.01"></div>
            <div class="field"><label>Target $</label><input id="e-target" type="number" step="0.01"></div>
          </div>

          <div style="font-size:11px;font-weight:700;color:#7f5af0;text-transform:uppercase;letter-spacing:.08em;margin-top:4px">Review Notes</div>
          <div class="field"><label>Did Well</label><textarea id="e-didwell" style="min-height:60px"></textarea></div>
          <div class="field"><label>Did Poorly</label><textarea id="e-didpoorly" style="min-height:60px"></textarea></div>
          <div class="field"><label>How to Improve</label><textarea id="e-howtoimprove" style="min-height:60px"></textarea></div>
          <div class="field"><label>What I Learned</label><textarea id="e-whatlearned" style="min-height:60px"></textarea></div>
          <div class="field"><label>Grade Notes</label><textarea id="e-gradenotes" style="min-height:60px"></textarea></div>

          <button onclick="saveEdit()" id="save-edit-btn" style="width:100%;padding:14px;background:#7f5af0;border:none;border-radius:10px;color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px">Save Changes</button>
          <div id="edit-status" style="text-align:center;font-size:12px;color:rgba(255,255,255,0.35);min-height:16px"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/tradeos/js/nav.js"></script>
  <script src="/tradeos/js/api.js"></script>
  <script>
    let _currentEditTrade = null;

    function openEditForm() {
      const t = _currentEditTrade;
      if (!t) return;
      document.getElementById('edit-ticker-label').textContent = t.ticker;
      document.getElementById('e-entry').value = t.entry || '';
      document.getElementById('e-exit').value = t.exit || '';
      document.getElementById('e-hod').value = t.high || '';
      document.getElementById('e-lod').value = t.low || '';
      document.getElementById('e-shares').value = t.shares || '';
      document.getElementById('e-duration').value = t.duration || '';
      document.getElementById('e-catalyst').value = t.catalyst || '';
      document.getElementById('e-float').value = t.float || '';
      document.getElementById('e-relvol').value = t.relVol || '';
      document.getElementById('e-stoploss').value = t.stopLoss || '';
      document.getElementById('e-target').value = t.target || '';
      document.getElementById('e-didwell').value = t.didWell || '';
      document.getElementById('e-didpoorly').value = t.didPoorly || '';
      document.getElementById('e-howtoimprove').value = t.howToImprove || '';
      document.getElementById('e-whatlearned').value = t.whatLearned || '';
      document.getElementById('e-gradenotes').value = t.gradeNotes || '';
      document.getElementById('edit-status').textContent = '';
      document.getElementById('edit-modal').style.display = 'block';
      document.getElementById('edit-modal').scrollTop = 0;
    }

    function closeEditModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }

    async function saveEdit() {
      const t = _currentEditTrade;
      if (!t || !t.id) {
        document.getElementById('edit-status').textContent = 'Cannot edit — no trade ID found';
        document.getElementById('edit-status').style.color = '#ef4565';
        return;
      }
      const btn = document.getElementById('save-edit-btn');
      const status = document.getElementById('edit-status');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      try {
        const result = await apiPost('updateTrade', {
          id: t.id,
          ticker: t.ticker,
          date: t.date,
          originalEntry: t.entry,
          originalExit: t.exit,
          actualEntry: document.getElementById('e-entry').value,
          exitPrice: document.getElementById('e-exit').value,
          highHeld: document.getElementById('e-hod').value,
          lowHeld: document.getElementById('e-lod').value,
          qty: document.getElementById('e-shares').value,
          duration: document.getElementById('e-duration').value,
          catalyst: document.getElementById('e-catalyst').value,
          float: document.getElementById('e-float').value,
          relVol: document.getElementById('e-relvol').value,
          stopLoss: document.getElementById('e-stoploss').value,
          target: document.getElementById('e-target').value,
          didWell: document.getElementById('e-didwell').value,
          didPoorly: document.getElementById('e-didpoorly').value,
          howToImprove: document.getElementById('e-howtoimprove').value,
          whatLearned: document.getElementById('e-whatlearned').value,
          gradeNotes: document.getElementById('e-gradenotes').value,
        });
        if (result && result.success) {
          status.textContent = 'Saved ✓';
          status.style.color = '#2cb67d';
          clearApiCache();
          setTimeout(() => {
            closeEditModal();
            closeModal();
            getTrades().then(trades => {
              if (!trades || !trades.length || trades[0]._empty) return;
              allTrades = trades.map((t, i) => {
                const entry = parseFloat(t.entry)||0, exit = parseFloat(t.exit)||0;
                const high = parseFloat(t.high)||exit, low = parseFloat(t.low)||entry;
                const shares = parseInt(t.shares)||0;
                const pnl = parseFloat(t.pnl)||(exit-entry)*shares;
                const maxPossible = shares*(high-entry);
                const captured = maxPossible>0 ? Math.round((pnl/maxPossible)*100) : (pnl>0?100:0);
                const left = Math.max(0, shares*(high - Math.max(entry, exit)));
                const savedFromLoss = Math.max(0, shares*(Math.min(entry, exit) - low));
                const _key = t.id ? String(t.id) : `${t.ticker}_${t.date}_${entry}_${exit}_${i}`;
                return { ...t, entry, exit, high, low, shares, pnl, captured, left, savedFromLoss, _key };
              }).filter(t => t.ticker && t.entry && t.exit);
              tradeMap = {};
              allTrades.forEach(t => { tradeMap[t._key] = t; });
              renderSummary();
              render();
            });
          }, 800);
        } else {
          btn.disabled = false;
          btn.textContent = 'Save Changes';
          status.textContent = 'Save failed — try again';
          status.style.color = '#ef4565';
        }
      } catch(e) {
        btn.disabled = false;
        btn.textContent = 'Save Changes';
        status.textContent = 'Error — check connection';
        status.style.color = '#ef4565';
      }
    }
  </script>
  <script>
    renderNav('candies');

    function openModal(t) {
      _currentEditTrade = t;
      const isWin = t.winLoss === 'WIN';
      const pnlColor = isWin ? '#2cb67d' : '#ef4565';
      const capColor = t.captured >= 70 ? '#2cb67d' : t.captured >= 40 ? '#f4b942' : '#ef4565';

      document.getElementById('modal-ticker').textContent = t.ticker;
      document.getElementById('modal-pills').innerHTML =
        (t.grade ? `<span class="pill ${gradeClass(t.grade)}" style="font-size:11px">${t.grade}</span>` : '') +
        (t.claudeGrade ? `<span class="pill" style="font-size:11px;background:rgba(244,185,66,0.15);color:#f4b942;border:1px solid rgba(244,185,66,0.3)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:2px"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>${t.claudeGrade}</span>` : '');
      document.getElementById('modal-date').textContent = formatDate(t.date) + (t.time ? '  ·  ' + t.time : '');
      const pnlEl = document.getElementById('modal-pnl');
      pnlEl.style.color = pnlColor;
      pnlEl.textContent = (isWin ? '+' : '-') + '$' + Math.abs(t.pnl).toFixed(2);
      document.getElementById('modal-header').style.background = isWin ? 'rgba(44,182,125,0.06)' : 'rgba(239,69,101,0.06)';
      document.getElementById('modal-candle').innerHTML = drawCandle(t.entry, t.high, t.low, t.exit, isWin);

      const statItems = [
        { label: 'Shares', value: t.shares },
        { label: 'Entry $', value: '$' + t.entry.toFixed(2) },
        { label: 'Exit $', value: '$' + t.exit.toFixed(2) },
        { label: 'HOD', value: '$' + t.high.toFixed(2), dim: true },
        { label: 'LOD', value: '$' + t.low.toFixed(2), dim: true },
        { label: 'Move', value: ((t.high - t.entry) / t.entry * 100).toFixed(1) + '%' },
        { label: 'Captured', value: t.captured + '%', color: capColor },
        { label: 'Duration', value: t.duration || '—', color: '#7f5af0' },
        { label: 'Left $', value: '$' + t.left.toFixed(2), color: '#f4b942' },
        { label: 'Saved $', value: '$' + t.savedFromLoss.toFixed(2), color: '#2cb67d' },
      ];
      document.getElementById('modal-stats').innerHTML = statItems.map(s =>
        `<div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:10px 12px">
          <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">${s.label}</div>
          <div style="font-size:14px;font-weight:800;color:${s.color || (s.dim ? 'rgba(255,255,255,0.45)' : '#e8e8f0')}">${s.value}</div>
        </div>`
      ).join('');

      const sections = [
        { label: 'Setup', value: t.setup },
        { label: 'Catalyst', value: t.catalyst },
        { label: 'Float', value: t.float },
        { label: 'Rel Volume', value: t.relVol },
        { label: 'Planned Entry', value: t.plannedEntry ? '$' + parseFloat(t.plannedEntry).toFixed(2) : null },
        { label: 'Stop Loss', value: t.stopLoss ? '$' + parseFloat(t.stopLoss).toFixed(2) : null },
        { label: 'Target', value: t.target ? '$' + parseFloat(t.target).toFixed(2) : null },
        { label: 'Emotion at Entry', value: t.emotionEntry },
        { label: 'Plan', value: t.plan },
        { label: 'Exit Reason', value: t.exitReason },
        { label: 'Emotion at Exit', value: t.emotionExit },
        { label: 'Did Well', value: t.didWell },
        { label: 'Did Poorly', value: t.didPoorly },
        { label: 'How to Improve', value: t.howToImprove },
        { label: 'What I Learned', value: t.whatLearned },
        { label: 'Grade Notes', value: t.gradeNotes || t.notes },
        { label: "Muninn's Grade", value: t.claudeGrade ? (t.claudeGrade + (t.mununNotes ? '\n' + t.mununNotes : '')) : null },
      ].filter(s => s.value && String(s.value).trim());

      document.getElementById('modal-body').innerHTML = sections.length
        ? sections.map(s =>
            `<div style="background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 14px">
              <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">${s.label}</div>
              <div style="font-size:14px;color:#e8e8f0;line-height:1.5;white-space:pre-wrap">${s.value}</div>
            </div>`
          ).join('')
        : '<div style="color:rgba(255,255,255,0.25);font-size:13px;text-align:center;padding:8px 0">No additional details logged.</div>';

      document.getElementById('grade-result').style.display = 'none';
      _gradeData = null;
      const gBtn = document.getElementById('grade-btn');
      gBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>';
      gBtn.disabled = false;
      const sBtn = document.getElementById('grade-save-btn');
      sBtn.style.display = 'none';
      sBtn.textContent = 'Save Grade to Journal';
      sBtn.disabled = false;
      sBtn.style.color = '#f4b942';
      sBtn.style.borderColor = 'rgba(244,185,66,0.3)';
      sBtn.style.background = 'rgba(244,185,66,0.15)';

      const modal = document.getElementById('trade-modal');
      modal.style.display = 'block';
      modal.scrollTop = 0;
      document.body.style.overflow = 'hidden';

      // Chart
      const tvTicker = t.ticker ? t.ticker.toUpperCase().replace(/[^A-Z0-9]/g, '') : '';
      window._tvTicker = tvTicker;
      loadChart(tvTicker, 'd');
      document.getElementById('tv-link').href = 'https://www.tradingview.com/chart/?symbol=' + tvTicker;
    }

    function loadChart(ticker, period) {
      var img = document.getElementById('finviz-chart');
      var err = document.getElementById('chart-err');
      img.style.display = 'block';
      err.style.display = 'none';
      img.src = '';
      img.onload = function() { img.style.display = 'block'; err.style.display = 'none'; };
      img.onerror = function() { img.style.display = 'none'; err.style.display = 'block'; };
      img.src = 'https://tradeos-proxy.gordon-foustiii.workers.dev/chart?t=' + ticker + '&p=' + period;
    }



    const MUNINN_SYSTEM = `You are Muninn — the AI grading oracle of The Den of Wisdom, Gordon Foust III's trading system.

You grade trades based strictly on Gordon's rules. Be direct, honest, and specific. Do not flatter.

NON-NEGOTIABLE RULES:
1. Catalyst required — no catalyst = automatic F
2. Stop market orders ONLY — never stop limit
3. No averaging down — ever
4. No trades before 9:45am
5. Candle must break resistance before entry
6. No revenge trading
7. $50 max loss — losses over $50 are a rule violation
8. Log every trade

ENTRY CHECKLIST (each missed item costs a grade):
- Real catalyst confirmed
- Float under 20M
- Relative volume 2x+
- Clean pullback to support — not chasing the spike
- Stop loss set before entry
- Risk under $50 calculated before entry
- Emotional state: calm and confident

GRADING SCALE:
A+ — Every rule followed, 70%+ of move captured, clean entry and exit
A  — All major rules followed, 50%+ captured, minor timing issues only
B  — Most rules followed, had a plan, 30-50% captured, one small mistake
C  — Had a catalyst, took the trade, missed 1-2 key rules or gave back gains
D  — Broke 2+ rules, poor timing, chased, or held through clear exit signal
F  — No catalyst, averaged down, ignored stop, or lost more than $50

RESPOND IN THIS EXACT FORMAT — nothing else:
GRADE: [letter]
REASONING: [2-3 sentences. Be specific. Reference the actual numbers.]`;

    let _gradeData = null;

    async function autoGrade() {
      const t = _currentEditTrade;
      if (!t) return;
      const btn = document.getElementById('grade-btn');
      const resultDiv = document.getElementById('grade-result');
      const letterEl = document.getElementById('grade-letter');
      const reasoningEl = document.getElementById('grade-reasoning');
      const saveBtn = document.getElementById('grade-save-btn');

      btn.textContent = 'Grading...';
      btn.disabled = true;
      resultDiv.style.display = 'none';
      saveBtn.style.display = 'none';
      _gradeData = null;

      const move = t.entry > 0 ? ((t.high - t.entry) / t.entry * 100).toFixed(1) : '0';
      const tradeContext = [
        'TRADE DATA:',
        'Ticker: ' + t.ticker,
        'Date: ' + t.date + (t.time ? ' at ' + t.time : ''),
        'Entry: $' + t.entry.toFixed(2),
        'Exit: $' + t.exit.toFixed(2),
        'Shares: ' + t.shares,
        'P&L: $' + t.pnl.toFixed(2) + ' (' + (t.winLoss || 'UNKNOWN') + ')',
        'HOD: $' + t.high.toFixed(2),
        'LOD: $' + t.low.toFixed(2),
        'Move from entry to HOD: ' + move + '%',
        'Captured: ' + t.captured + '% of the move',
        'Left on table: $' + t.left.toFixed(2),
        'Duration: ' + (t.duration || 'not logged'),
        'Catalyst: ' + (t.catalyst || 'NOT LOGGED'),
        'Float: ' + (t.float || 'not logged'),
        'Rel Volume: ' + (t.relVol || 'not logged'),
        'Stop Loss set: ' + (t.stopLoss ? '$' + parseFloat(t.stopLoss).toFixed(2) : 'NOT LOGGED'),
        'Target set: ' + (t.target || 'not logged'),
        'Setup type: ' + (t.setup || 'not logged'),
        'Plan logged: ' + (t.plan ? 'YES — ' + t.plan : 'NO'),
        'Emotion at entry: ' + (t.emotionEntry || 'not logged'),
        'Emotion at exit: ' + (t.emotionExit || 'not logged'),
        'Did well: ' + (t.didWell || 'not logged'),
        'Did poorly: ' + (t.didPoorly || 'not logged'),
        'Exit reason: ' + (t.exitReason || 'not logged'),
        '',
        'Grade this trade based on the rules above.'
      ].join('\n');

      try {
        const response = await fetch('https://tradeos-proxy.gordon-foustiii.workers.dev/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-5',
            max_tokens: 300,
            system: MUNINN_SYSTEM,
            messages: [{ role: 'user', content: tradeContext }]
          })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
        if (!data.content || !data.content[0]) throw new Error('Empty response');

        const text = data.content[0].text.trim();
        const gradeMatch = text.match(/GRADE:\s*([A-F][+-]?)/i);
        const reasonMatch = text.match(/REASONING:\s*([\s\S]+)/i);
        const grade = gradeMatch ? gradeMatch[1].toUpperCase() : '?';
        const reasoning = reasonMatch ? reasonMatch[1].trim() : text;

        const gradeColors = { 'A+': '#2cb67d', 'A': '#2cb67d', 'B': '#5ba4cf', 'C': '#f4b942', 'D': '#ef4565', 'F': '#ef4565' };
        letterEl.textContent = grade;
        letterEl.style.color = gradeColors[grade] || '#f4b942';
        reasoningEl.textContent = reasoning;
        resultDiv.style.display = 'block';
        saveBtn.style.display = 'block';
        _gradeData = { grade, reasoning };
        document.getElementById('trade-modal').scrollTo({ top: 99999, behavior: 'smooth' });

      } catch(e) {
        letterEl.textContent = '!';
        letterEl.style.color = '#ef4565';
        reasoningEl.textContent = 'Error: ' + e.message;
        resultDiv.style.display = 'block';
      }
      btn.textContent = 'Grade';
      btn.disabled = false;
    }

    async function saveGrade() {
      if (!_gradeData || !_currentEditTrade) return;
      const t = _currentEditTrade;
      if (!t.id) { alert('Cannot save grade — trade has no ID.'); return; }
      const btn = document.getElementById('grade-save-btn');
      btn.textContent = 'Saving...';
      btn.disabled = true;
      try {
        const result = await apiPost('updateTrade', {
          id: t.id,
          ticker: t.ticker,
          date: t.date,
          originalEntry: t.entry,
          originalExit: t.exit,
          gradeOnly: true,
          claudeGrade: _gradeData.grade,
          mununNotes: _gradeData.reasoning,
        });
        if (result && result.success) {
          btn.textContent = 'Saved \u2713';
          btn.style.color = '#2cb67d';
          btn.style.borderColor = 'rgba(44,182,125,0.4)';
          btn.style.background = 'rgba(44,182,125,0.1)';
          // Update in-memory trade and re-render cards immediately
          if (_currentEditTrade) {
            _currentEditTrade.claudeGrade = _gradeData.grade;
            _currentEditTrade.mununNotes = _gradeData.reasoning;
            if (tradeMap[_currentEditTrade._key]) {
              tradeMap[_currentEditTrade._key].claudeGrade = _gradeData.grade;
              tradeMap[_currentEditTrade._key].mununNotes = _gradeData.reasoning;
            }
            render();
          }
        } else {
          btn.textContent = 'Save failed — try again';
          btn.disabled = false;
        }
      } catch(e) {
        btn.textContent = 'Error — try again';
        btn.disabled = false;
      }
    }

    function closeModal() {
      document.getElementById('trade-modal').style.display = 'none';
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    let allTrades = [], activeFilter = 'all', activeSort = 'date', pnlSortDir = 'desc';

    function formatDate(val) {
      if (!val) return '—';
      const d = new Date(val);
      if (isNaN(d.getTime())) return String(val);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function gradeClass(g) { return g==='A+'?'g-a':g==='B'?'g-b':g==='C'?'g-c':g?'g-f':''; }

    function drawCandle(entry, high, low, exit, isWin) {
      const prices = [entry, high, low, exit];
      const minP = Math.min(...prices) * 0.94, maxP = Math.max(...prices) * 1.06, range = maxP - minP;
      if (range === 0) return '';
      const p = v => ((v - minP) / range * 100).toFixed(1) + '%';
      const bL = Math.min(entry, exit), bR = Math.max(entry, exit);
      const bW = Math.max(((bR - bL) / range * 100), 1).toFixed(1) + '%';
      const col = isWin ? '#2cb67d' : '#ef4565', dark = isWin ? '#1a8c55' : '#c03050';
      return `<div style="position:relative;padding-bottom:28px;margin:10px 0 6px">
        <svg width="100%" height="44" style="overflow:visible;display:block">
          <line x1="${p(low)}" y1="22" x2="${p(bL)}" y2="22" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="${p(bR)}" y1="22" x2="${p(high)}" y2="22" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="${p(bL)}" y="8" width="${bW}" height="28" fill="${col}" stroke="${dark}" stroke-width="1" rx="4"/>
          <line x1="${p(entry)}" y1="2" x2="${p(entry)}" y2="42" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="3,2"/>
          <line x1="${p(exit)}" y1="2" x2="${p(exit)}" y2="42" stroke="white" stroke-width="2"/>
        </svg>
        <div style="position:relative;height:22px;font-size:11px">
          <span style="position:absolute;left:${p(low)};transform:translateX(-50%);color:rgba(255,255,255,0.4);white-space:nowrap">L $${low.toFixed(2)}</span>
          <span style="position:absolute;left:${p(entry)};transform:translateX(-50%);background:${col};color:white;padding:2px 6px;border-radius:4px;white-space:nowrap;font-weight:700">E $${entry.toFixed(2)}</span>
          <span style="position:absolute;left:${p(exit)};transform:translateX(-50%);background:${dark};color:white;padding:2px 6px;border-radius:4px;white-space:nowrap;font-weight:700">X $${exit.toFixed(2)}</span>
          <span style="position:absolute;left:${p(high)};transform:translateX(-50%);color:rgba(255,255,255,0.4);white-space:nowrap">H $${high.toFixed(2)}</span>
        </div>
      </div>`;
    }

    function renderSummary(){
      const wins=allTrades.filter(t=>t.winLoss==='WIN').length;
      const totalPnl=allTrades.reduce((s,t)=>s+t.pnl,0);
      const best=allTrades.length?Math.max(...allTrades.map(t=>t.pnl)):0;
      const worst=allTrades.length?Math.min(...allTrades.map(t=>t.pnl)):0;
      const left=allTrades.reduce((s,t)=>s+t.left,0);
      const saved=allTrades.reduce((s,t)=>s+t.savedFromLoss,0);
      const wr=allTrades.length?Math.round(wins/allTrades.length*100):0;

      const pnlColor = totalPnl >= 0 ? '#2cb67d' : '#ef4565';
      const sign = totalPnl >= 0 ? '+' : '-';
      const absVal = Math.abs(totalPnl).toFixed(2);
      const [dollars, cents] = absVal.split('.');
      const padded = dollars.padStart(9, '0');
      const firstSig = padded.search(/[^0]/);
      let odometer = sign + '$';
      for (let i = 0; i < padded.length; i++) {
        const dim = i < firstSig;
        odometer += `<span style="color:${dim ? 'rgba(255,255,255,0.15)' : pnlColor}">${padded[i]}</span>`;
        if (i === 2) odometer += `<span style="color:rgba(255,255,255,0.15)">,</span>`;
        if (i === 5) odometer += `<span style="color:rgba(255,255,255,0.15)">,</span>`;
      }
      odometer += `<span style="color:${pnlColor}">.</span>`;
      odometer += `<span style="color:${pnlColor}">${cents}</span>`;

      document.getElementById('summary').innerHTML=`
        <div class="metric"><div class="metric-label">Trades</div><div class="metric-value">${allTrades.length}</div></div>
        <div class="metric"><div class="metric-label">Win rate</div><div class="metric-value ${wr>=50?'green':'amber'}">${wr}%</div></div>
        <div class="metric"><div class="metric-label">Worst</div><div class="metric-value red">$${Math.abs(worst).toFixed(2)}</div></div>
        <div class="metric"><div class="metric-label">Best</div><div class="metric-value green">+$${best.toFixed(2)}</div></div>
        <div class="metric"><div class="metric-label">Saved from loss</div><div class="metric-value green">$${saved.toFixed(2)}</div></div>
        <div class="metric"><div class="metric-label">Left on table</div><div class="metric-value amber">$${left.toFixed(2)}</div></div>
        <div class="metric" style="grid-column:span 2"><div class="metric-label">Net P&L</div><div style="font-size:28px;font-weight:800;letter-spacing:-1px;color:${pnlColor}">${odometer}</div></div>`;
    }

    function render() {
      let trades = [...allTrades].filter(t => {
        if (activeFilter === 'win') return t.winLoss === 'WIN';
        if (activeFilter === 'loss') return t.winLoss !== 'WIN';
        return true;
      });
      if (activeSort === 'pnl') trades.sort((a,b) => pnlSortDir === 'desc' ? b.pnl - a.pnl : a.pnl - b.pnl);
      else if (activeSort === 'captured') trades.sort((a,b) => b.captured - a.captured);
      else if (activeSort === 'left') trades.sort((a,b) => b.left - a.left);
      else trades.sort((a,b) => new Date(b.date) - new Date(a.date));

      const container = document.getElementById('candies-container');
      if (!trades.length) { container.innerHTML = '<div class="empty">No trades match.</div>'; return; }

      container.innerHTML = trades.map(t => {
        const isWin = t.winLoss === 'WIN';
        const capColor = t.captured >= 70 ? '#2cb67d' : t.captured >= 40 ? '#f4b942' : '#ef4565';
        const safeKey = t._key.replace(/'/g, "\\'");
        return `<div class="candle-card" onclick="openModal(tradeMap['${safeKey}'])" style="cursor:pointer" onmouseenter="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,0.4)'" onmouseleave="this.style.transform='';this.style.boxShadow=''">
          <div class="ch">
            <div>
              <div class="cticker">${t.ticker}${t.grade ? ` <span class="pill ${gradeClass(t.grade)}" style="font-size:11px;vertical-align:middle">${t.grade}</span>` : ''}${t.claudeGrade ? ` <span class="pill g-m" style="font-size:11px;vertical-align:middle;background:rgba(244,185,66,0.15);color:#f4b942;border:1px solid rgba(244,185,66,0.3)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:2px"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>${t.claudeGrade}</span>` : ''}</div>
              <div class="cdate">${formatDate(t.date)}</div>
            </div>
            <div class="cpnl ${isWin?'win':'loss'}">${isWin?'+':'-'}$${Math.abs(t.pnl).toFixed(2)}</div>
          </div>
          ${drawCandle(t.entry, t.high, t.low, t.exit, isWin)}
          <div class="cstats">
            <div class="cs"><div class="cs-label">Saved $</div><div class="cs-value" style="color:#2cb67d">$${t.savedFromLoss.toFixed(2)}</div></div>
            <div class="cs"><div class="cs-label">Shares</div><div class="cs-value">${t.shares}</div></div>
            <div class="cs"><div class="cs-label">Move</div><div class="cs-value">${((t.high-t.entry)/t.entry*100).toFixed(1)}%</div></div>
            <div class="cs"><div class="cs-label">Captured</div><div class="cs-value" style="color:${capColor}">${t.captured}%</div></div>
            <div class="cs"><div class="cs-label">Left $</div><div class="cs-value" style="color:#f4b942">$${t.left.toFixed(2)}</div></div>
          </div>
          <div style="text-align:center;font-size:11px;color:rgba(255,255,255,0.18);margin-top:6px;letter-spacing:.04em">tap for details</div>
        </div>`;
      }).join('');
    }

    function setFilter(f, btn) {
      activeFilter = f;
      document.querySelectorAll('#filter-row .fb').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); render();
    }
    function setSort(s, btn) {
      if (s === 'pnl' && activeSort === 'pnl') {
        pnlSortDir = pnlSortDir === 'desc' ? 'asc' : 'desc';
        btn.textContent = pnlSortDir === 'desc' ? 'P&L ↓' : 'P&L ↑';
      } else {
        activeSort = s;
        document.querySelectorAll('#sort-row .fb').forEach(b => {
          b.classList.remove('active');
          if (b.dataset.sort === 'pnl') b.textContent = 'P&L ↓';
        });
        btn.classList.add('active');
        if (s === 'pnl') { pnlSortDir = 'desc'; btn.textContent = 'P&L ↓'; }
      }
      render();
    }

    let tradeMap = {};

    getTrades().then(trades => {
      if (!trades || !trades.length || trades[0]._empty) {
        document.getElementById('candies-container').innerHTML = '<div class="empty">No trades yet.</div>';
        return;
      }
      allTrades = trades.map((t, i) => {
        const entry = parseFloat(t.entry)||0, exit = parseFloat(t.exit)||0;
        const high = parseFloat(t.high)||exit, low = parseFloat(t.low)||entry;
        const shares = parseInt(t.shares)||0;
        const pnl = parseFloat(t.pnl)||(exit-entry)*shares;
        const maxPossible = shares*(high-entry);
        const captured = maxPossible>0 ? Math.round((pnl/maxPossible)*100) : (pnl>0?100:0);
        const left = Math.max(0, shares*(high - Math.max(entry, exit)));
        const savedFromLoss = Math.max(0, shares*(Math.min(entry, exit) - low));
        const _key = t.id ? String(t.id) : `${t.ticker}_${t.date}_${entry}_${exit}_${i}`;
        return { ...t, entry, exit, high, low, shares, pnl, captured, left, savedFromLoss, _key };
      }).filter(t => t.ticker && t.entry && t.exit);

      tradeMap = {};
      allTrades.forEach(t => { tradeMap[t._key] = t; });

      renderSummary();
      render();
    });
  </script>
</body>
</html>
