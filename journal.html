<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Journal — TradeOS</title>
  <link rel="manifest" href="/tradeos/manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      background-attachment: fixed;
      color: #fff;
      line-height: 1.5;
      min-height: 100vh;
      padding-bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 768px) {
      body {
        padding-bottom: 100px;
      }
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 72px;
      flex-shrink: 0;
    }

    .topbar-brand {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
    }

    .topbar-brand span {
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-menu {
      display: flex;
      gap: 12px;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      cursor: pointer;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 18px;
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffd93d;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-icon svg {
      width: 20px;
      height: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
      width: 100%;
    }

    .header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 14px;
      color: #aaa;
    }

    .content {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      min-height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .content.trades {
      padding: 0;
      display: block;
      background: transparent;
      border: none;
      min-height: auto;
    }

    .content-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .content-text {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .content-subtext {
      font-size: 14px;
      color: #666;
    }

    .footer-nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 4px;
      background: rgba(0, 0, 0, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .nav-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 4px;
      text-decoration: none;
      color: #aaa;
      border-radius: 8px;
      transition: all 0.2s;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .nav-link svg {
      width: 20px;
      height: 20px;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ffd93d;
    }

    .nav-link.active {
      background: rgba(255, 255, 255, 0.05);
      color: #ffd93d;
      border-bottom: 2px solid #ffd93d;
    }

    /* ===== ACTION BUTTONS ===== */
    .header-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .btn-action {
      padding: 10px 16px;
      background: rgba(255, 215, 61, 0.1);
      border: 1px solid rgba(255, 215, 61, 0.3);
      color: #ffd93d;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .btn-action:hover {
      background: rgba(255, 215, 61, 0.2);
      border-color: rgba(255, 215, 61, 0.5);
    }

    .btn-action:active {
      transform: scale(0.98);
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease-out;
    }

    .modal-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-content {
      background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease-out;
      position: relative;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 16px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 28px;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: #ffd93d;
    }

    .modal-section {
      margin-bottom: 24px;
    }

    .modal-section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .modal-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 16px;
    }

    .modal-row.full {
      grid-template-columns: 1fr;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
    }

    .modal-field-label {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .modal-field-value {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .modal-field-value.positive {
      color: #4ade80;
    }

    .modal-field-value.negative {
      color: #ff6b6b;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }

    .modal-btn.primary {
      background: rgba(255, 215, 61, 0.2);
      color: #ffd93d;
      border: 1px solid rgba(255, 215, 61, 0.3);
    }

    .modal-btn.primary:hover {
      background: rgba(255, 215, 61, 0.3);
      border-color: rgba(255, 215, 61, 0.5);
    }

    .modal-btn.danger {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .modal-btn.danger:hover {
      background: rgba(255, 107, 107, 0.3);
      border-color: rgba(255, 107, 107, 0.5);
    }

    /* ===== TABS ===== */
    .tab-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .tab-btn {
      padding: 12px 16px;
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tab-btn:hover {
      color: #ffd93d;
    }

    .tab-btn.active {
      color: #ffd93d;
      border-bottom-color: #ffd93d;
    }

    /* ===== TRADES GRID ===== */
    .trades-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .trade-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
    }

    .trade-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .trade-card.winning {
      border-left: 4px solid #4ade80;
    }

    .trade-card.losing {
      border-left: 4px solid #ff6b6b;
    }

    .trade-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 16px;
    }

    .trade-ticker {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
    }

    .trade-status {
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
      font-weight: 600;
      text-transform: uppercase;
    }

    .trade-status.closed {
      background: rgba(160, 160, 160, 0.2);
      color: #aaa;
    }

    .trade-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .trade-label {
      color: #888;
    }

    .trade-value {
      color: #fff;
      font-weight: 600;
    }

    .trade-value.positive {
      color: #4ade80;
    }

    .trade-value.negative {
      color: #ff6b6b;
    }

    .trade-divider {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 12px 0;
    }

    .trade-pnl {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      padding: 12px;
      text-align: center;
      margin: 12px 0;
    }

    .trade-pnl-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .trade-pnl-value {
      font-size: 18px;
      font-weight: 700;
    }

    .trade-pnl-value.positive {
      color: #4ade80;
    }

    .trade-pnl-value.negative {
      color: #ff6b6b;
    }

    .trade-notes {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      color: #aaa;
      margin: 12px 0;
      max-height: 60px;
      overflow-y: auto;
    }

    .trade-news {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 107, 107, 0.2);
      border-radius: 6px;
      padding: 10px;
      font-size: 11px;
      color: #ff9999;
      margin: 12px 0;
      max-height: 80px;
      overflow-y: auto;
    }

    .trade-news-item {
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .trade-news-item:last-child {
      margin-bottom: 0;
    }

    .trade-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .trade-btn {
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .trade-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .trade-btn.close {
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      border: none;
      color: #0f0f0f;
    }

    .trade-btn.close:hover {
      transform: translateY(-2px);
    }

    /* ===== OPPORTUNITY & RISK FIELDS ===== */
    .trade-metrics {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 12px 0;
    }

    .trade-metric {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }

    .trade-metric-label {
      font-size: 9px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 3px;
      letter-spacing: 0.4px;
    }

    .trade-metric-value {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .trade-metric-value.warning {
      color: #ffd93d;
    }

    .trade-metric-value.zero {
      color: #666;
    }

    /* ===== CANDY CARD (REDESIGNED CLOSED TRADES) ===== */
    .candy-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .candy-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 215, 61, 0.3);
    }

    .candy-card.active {
      border-color: rgba(255, 215, 61, 0.6);
      background: rgba(255, 215, 61, 0.08);
    }

    /* Header: Ticker + Grade | P&L */
    .candy-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .candy-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .candy-ticker {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .candy-grade {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255, 215, 61, 0.1);
      color: #ffd93d;
      min-width: 30px;
      text-align: center;
    }

    .candy-pnl {
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
    }

    .candy-pnl.positive {
      color: #4ade80;
    }

    .candy-pnl.negative {
      color: #ff6b6b;
    }

    /* Chart strip */
    .candy-chart {
      height: 50px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      padding: 6px;
      gap: 1px;
    }

    .candy-bar {
      flex: 1;
      background: linear-gradient(to top, #ff6b6b, #ff8787);
      border-radius: 2px;
      min-height: 2px;
    }

    .candy-bar.positive {
      background: linear-gradient(to top, #4ade80, #6ee7b7);
    }

    /* Footer: 5-cell grid (Shares | Move | Captured | Saved $ | Left $) */
    .candy-stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .candy-stat {
      display: flex;
      flex-direction: column;
      gap: 4px;
      text-align: center;
    }

    .candy-stat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      font-weight: 500;
    }

    .candy-stat-value {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }

    .candy-stat-value.warning {
      color: #ffd93d;
    }

    .candy-stat-value.zero {
      color: #666;
    }

    .candy-stat-value.positive {
      color: #4ade80;
    }

    .candy-stat-value.negative {
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand" onclick="goHome()" style="cursor: pointer;">
      TRADEOS
    </div>
    <div class="topbar-menu">
      <button class="btn-icon" onclick="goProfile()" title="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div class="page-title">Trade Journal</div>
      <div class="page-subtitle">Track active trades and historical performance. Upload .csv with format: Ticker, Entry, Exit, Shares, P&L, Return %, High, Low, Move %, Captured %, Status, Date</div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="header-actions">
      <button class="btn-action" onclick="openAddTradeModal()">+ Add Trade</button>
      <button class="btn-action" onclick="handleBulkUpload()">📁 Bulk Upload CSV</button>
      <button class="btn-action" onclick="exportToCSV()">📥 Export CSV</button>
    </div>

    <div id="tradesContainer" class="content trades">
      <div class="trades-grid" id="tradesGrid">
        <!-- Trades will render here -->
      </div>
    </div>

    <div class="footer-nav">
      <a href="/tradeos/scanner.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Scanner
      </a>
      <a href="/tradeos/plays.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Plays
      </a>
      <a href="/tradeos/journal.html" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Journal
      </a>
      <a href="/tradeos/tools.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        Tools
      </a>
    </div>
  </div>

  <script>
    // Your existing scanner worker URL
    const WORKER_URL = 'https://your-worker-subdomain.workers.dev';

    async function fetchLivePrice(ticker) {
      try {
        const res = await fetch(`${WORKER_URL}/quote/${ticker}`);
        if (!res.ok) return null;
        
        const data = await res.json();
        if (data.price) {
          return data.price;
        }
      } catch (e) {
        console.error('Price fetch failed for ' + ticker, e.message);
      }
      return null;
    }

    function formatCurrency(value) {
      return '$' + value.toFixed(2);
    }

    function calculatePnL(trade) {
      return (trade.currentPrice - trade.entryPrice) * trade.shares;
    }

    function generateMockNews() {
      const newsList = [
        'Possible catalyst: Earnings due Friday',
        'Volume: 2.3M shares (1.8x avg)',
        'Relative strength: 72 (strong)',
      ];
      return newsList.slice(0, Math.floor(Math.random() * 2) + 1);
    }

    function drawCandle(entry, high, low, exit, isWin) {
      const prices = [entry, high, low, exit];
      const minP = Math.min(...prices) * 0.94, maxP = Math.max(...prices) * 1.06, range = maxP - minP;
      if (range === 0) return '';
      const p = v => ((v - minP) / range * 100).toFixed(1) + '%';
      const bL = Math.min(entry, exit), bR = Math.max(entry, exit);
      const bW = Math.max(((bR - bL) / range * 100), 1).toFixed(1) + '%';
      const col = isWin ? '#4ade80' : '#ff6b6b', dark = isWin ? '#22c55e' : '#ef4444';
      return `<div style="position:relative;padding-bottom:28px;margin:10px 0 6px">
        <svg width="100%" height="44" style="overflow:visible;display:block">
          <line x1="${p(low)}" y1="22" x2="${p(bL)}" y2="22" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="${p(bR)}" y1="22" x2="${p(high)}" y2="22" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="${p(bL)}" y="8" width="${bW}" height="28" fill="${col}" stroke="${dark}" stroke-width="1" rx="4"/>
          <line x1="${p(entry)}" y1="2" x2="${p(entry)}" y2="42" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="3,2"/>
          <line x1="${p(exit)}" y1="2" x2="${p(exit)}" y2="42" stroke="white" stroke-width="2"/>
        </svg>
        <div style="position:relative;height:22px;font-size:11px">
          <span style="position:absolute;left:${p(low)};transform:translateX(-50%);color:rgba(255,255,255,0.4);white-space:nowrap">L $${low.toFixed(2)}</span>
          <span style="position:absolute;left:${p(entry)};transform:translateX(-50%);background:${col};color:white;padding:2px 6px;border-radius:4px;white-space:nowrap;font-weight:700">E $${entry.toFixed(2)}</span>
          <span style="position:absolute;left:${p(exit)};transform:translateX(-50%);background:${dark};color:white;padding:2px 6px;border-radius:4px;white-space:nowrap;font-weight:700">X $${exit.toFixed(2)}</span>
          <span style="position:absolute;left:${p(high)};transform:translateX(-50%);color:rgba(255,255,255,0.4);white-space:nowrap">H $${high.toFixed(2)}</span>
        </div>
      </div>`;
    }

    // Candy card version: same candlestick as drawCandle but compact (no labels below)
    function drawCandleChart(entry, high, low, exit, isWin) {
      const prices = [entry, high, low, exit];
      const minP = Math.min(...prices) * 0.94, maxP = Math.max(...prices) * 1.06, range = maxP - minP;
      if (range === 0) return '';
      const p = v => ((v - minP) / range * 100).toFixed(1) + '%';
      const bL = Math.min(entry, exit), bR = Math.max(entry, exit);
      const bW = Math.max(((bR - bL) / range * 100), 1).toFixed(1) + '%';
      const col = isWin ? '#4ade80' : '#ff6b6b', dark = isWin ? '#22c55e' : '#ef4444';
      return `<div style="position:relative;height:50px;margin:12px 0">
        <svg width="100%" height="44" style="overflow:visible;display:block">
          <line x1="${p(low)}" y1="22" x2="${p(bL)}" y2="22" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="${p(bR)}" y1="22" x2="${p(high)}" y2="22" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/>
          <rect x="${p(bL)}" y="8" width="${bW}" height="28" fill="${col}" stroke="${dark}" stroke-width="1" rx="4"/>
          <line x1="${p(entry)}" y1="2" x2="${p(entry)}" y2="42" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="3,2"/>
          <line x1="${p(exit)}" y1="2" x2="${p(exit)}" y2="42" stroke="white" stroke-width="2"/>
        </svg>
      </div>`;
    }


    function loadTrades() {
      const trades = JSON.parse(localStorage.getItem('tradeos_journal') || '[]');
      const grid = document.getElementById('tradesGrid');
      
      if (trades.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #aaa;">
            <div style="font-size: 48px; margin-bottom: 16px;">🕯️</div>
            <div style="font-size: 18px; margin-bottom: 8px;">No Trades Yet</div>
            <div style="font-size: 14px;">Execute trades from Plays to see them appear here</div>
          </div>
        `;
        return;
      }

      // Separate open and closed trades
      const openTrades = trades.filter(t => t.status === 'ACTIVE' || t.status === 'OPEN');
      const closedTrades = trades.filter(t => t.status === 'CLOSED');

      // Sort closed trades by date (newest first)
      closedTrades.sort((a, b) => {
        const dateA = new Date(a.closedAt || a.timestamp || 0).getTime();
        const dateB = new Date(b.closedAt || b.timestamp || 0).getTime();
        return dateB - dateA;
      });

      // Combine: open trades first, then closed
      const sorted = [...openTrades, ...closedTrades];

      grid.innerHTML = sorted.map(t => {
        const entry = parseFloat(t.entryPrice || t.entry || 0);
        const exit = parseFloat(t.currentPrice || t.exit || entry);
        const shares = parseFloat(t.shares || 0);
        const high = parseFloat(t.high || exit);
        const low = parseFloat(t.low || entry);

        // P&L calculation
        const pnl = (exit - entry) * shares;
        const pnlPct = entry > 0 ? ((pnl / (entry * shares)) * 100) : 0;
        const isWinning = pnl >= 0;

        // Left on Table = (High - max(Entry, Exit)) * Shares
        const leftOnTable = Math.max(0, (high - Math.max(entry, exit)) * shares);

        // Saved from Loss = (min(Entry, Exit) - Low) * Shares
        const savedFromLoss = Math.max(0, (Math.min(entry, exit) - low) * shares);

        // Move percentage
        const movePercent = entry > 0 ? ((high - entry) / entry * 100) : 0;
        
        // Captured percentage
        const maxPossible = entry > 0 ? ((high - entry) / entry * 100) : 0;
        const actualMove = entry > 0 ? ((exit - entry) / entry * 100) : 0;
        const captured = maxPossible > 0 ? (actualMove / maxPossible * 100) : 0;

        const status = t.status === 'CLOSED' ? 'CLOSED' : 'OPEN';
        const grade = t.grade || '—'; // Placeholder for grade field

        // CLOSED TRADES: Minimal Candy Card
        if (status === 'CLOSED') {
          return `
            <div class="candy-card" onclick="openTradeModal(${t.id})">
              <!-- Header: Ticker + Grade | P&L -->
              <div class="candy-header">
                <div class="candy-header-left">
                  <div class="candy-ticker">${t.ticker || 'N/A'}</div>
                  <div class="candy-grade">${grade}</div>
                </div>
                <div class="candy-pnl ${isWinning ? 'positive' : 'negative'}">
                  ${isWinning ? '+' : ''}$${pnl.toFixed(2)} (${isWinning ? '+' : ''}${pnlPct.toFixed(1)}%)
                </div>
              </div>

              <!-- Chart Bar -->
              ${drawCandleChart(entry, high, low, exit, isWinning)}

              <!-- Footer Grid: Shares | Move | Captured | Saved $ | Left $ -->
              <div class="candy-stats">
                <div class="candy-stat">
                  <div class="candy-stat-label">Shares</div>
                  <div class="candy-stat-value">${shares.toFixed(0)}</div>
                </div>
                <div class="candy-stat">
                  <div class="candy-stat-label">Move</div>
                  <div class="candy-stat-value">${movePercent.toFixed(1)}%</div>
                </div>
                <div class="candy-stat">
                  <div class="candy-stat-label">Captured</div>
                  <div class="candy-stat-value">${captured.toFixed(1)}%</div>
                </div>
                <div class="candy-stat">
                  <div class="candy-stat-label">Saved $</div>
                  <div class="candy-stat-value ${savedFromLoss > 0 ? 'positive' : 'zero'}">${savedFromLoss > 0 ? '$' + savedFromLoss.toFixed(2) : '—'}</div>
                </div>
                <div class="candy-stat">
                  <div class="candy-stat-label">Left $</div>
                  <div class="candy-stat-value ${leftOnTable > 0 ? 'warning' : 'zero'}">${leftOnTable > 0 ? '$' + leftOnTable.toFixed(2) : '—'}</div>
                </div>
              </div>
            </div>
          `;
        }

        // OPEN TRADES: Full detail card (unchanged)
        return `
          <div class="trade-card ${isWinning ? 'winning' : 'losing'}" onclick="openTradeModal(${t.id})" style="cursor: pointer;">
            <div class="trade-header">
              <div class="trade-ticker">${t.ticker || 'N/A'}</div>
              <div class="trade-status ${status === 'CLOSED' ? 'closed' : ''}">
                ${status}
              </div>
            </div>

            <!-- Horizontal Candle -->
            ${drawCandle(entry, high, low, exit, isWinning)}

            <!-- Metrics Row -->
            <div class="trade-metrics">
              <div class="trade-metric">
                <div class="trade-metric-label">Shares</div>
                <div class="trade-metric-value">${shares.toFixed(0)}</div>
              </div>
              <div class="trade-metric">
                <div class="trade-metric-label">Move</div>
                <div class="trade-metric-value">${movePercent.toFixed(1)}%</div>
              </div>
              <div class="trade-metric">
                <div class="trade-metric-label">Captured</div>
                <div class="trade-metric-value">${captured.toFixed(1)}%</div>
              </div>
              <div class="trade-metric">
                <div class="trade-metric-label">Saved $</div>
                <div class="trade-metric-value ${savedFromLoss > 0 ? '' : 'zero'}">${savedFromLoss > 0 ? '$' + savedFromLoss.toFixed(2) : '—'}</div>
              </div>
              <div class="trade-metric">
                <div class="trade-metric-label">Left $</div>
                <div class="trade-metric-value ${leftOnTable > 0 ? 'warning' : 'zero'}">${leftOnTable > 0 ? '$' + leftOnTable.toFixed(2) : '—'}</div>
              </div>
            </div>

            <div class="trade-divider"></div>

            <!-- P&L Box -->
            <div class="trade-pnl">
              <div class="trade-pnl-label">P&L</div>
              <div class="trade-pnl-value ${isWinning ? 'positive' : 'negative'}">
                ${isWinning ? '+' : ''}$${pnl.toFixed(2)} (${isWinning ? '+' : ''}${pnlPct.toFixed(1)}%)
              </div>
            </div>

            <!-- Actions -->
            <div class="trade-actions">
              <button class="trade-btn" onclick="editTrade(event, ${t.id})">Update</button>
              <button class="trade-btn close" onclick="closeTrade(event, ${t.id})">Close Trade</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function editTrade(event, id) {
      event.stopPropagation();
      const trades = JSON.parse(localStorage.getItem('tradeos_journal') || '[]');
      const trade = trades.find(t => t.id === id);
      if (!trade) return;

      // Simulate live price update
      const newPrice = trade.currentPrice + (Math.random() - 0.5) * 0.3;
      trade.currentPrice = Math.max(0.01, newPrice);
      trade.high = Math.max(trade.high, trade.currentPrice);
      trade.low = Math.min(trade.low, trade.currentPrice);

      localStorage.setItem('tradeos_journal', JSON.stringify(trades));
      loadTrades();
    }

    function closeTrade(event, id) {
      event.stopPropagation();
      const trades = JSON.parse(localStorage.getItem('tradeos_journal') || '[]');
      const trade = trades.find(t => t.id === id);
      if (!trade) return;

      if (confirm(`Close ${trade.ticker}? Exit price: ${formatCurrency(trade.currentPrice)}`)) {
        trade.status = 'CLOSED';
        trade.closedAt = new Date().toISOString();
        localStorage.setItem('tradeos_journal', JSON.stringify(trades));
        loadTrades();
      }
    }

    // ===== MODAL FUNCTIONS =====
    let currentModalTradeId = null;

    function openTradeModal(id) {
      const trades = JSON.parse(localStorage.getItem('tradeos_journal') || '[]');
      const trade = trades.find(t => t.id === id);
      if (!trade) return;

      currentModalTradeId = id;

      const entry = parseFloat(trade.entryPrice || trade.entry || 0);
      const exit = parseFloat(trade.currentPrice || trade.exit || entry);
      const shares = parseFloat(trade.shares || 0);
      const high = parseFloat(trade.high || exit);
      const low = parseFloat(trade.low || entry);

      const pnl = (exit - entry) * shares;
      const pnlPct = entry > 0 ? ((pnl / (entry * shares)) * 100) : 0;

      const movePercent = entry > 0 ? ((high - entry) / entry * 100) : 0;
      const maxPossible = entry > 0 ? ((high - entry) / entry * 100) : 0;
      const actualMove = entry > 0 ? ((exit - entry) / entry * 100) : 0;
      const captured = maxPossible > 0 ? (actualMove / maxPossible * 100) : 0;

      const leftOnTable = Math.max(0, (high - Math.max(entry, exit)) * shares);
      const savedFromLoss = Math.max(0, (Math.min(entry, exit) - low) * shares);

      // Populate modal
      document.getElementById('modalTicker').textContent = trade.ticker || 'N/A';
      document.getElementById('modalEntry').textContent = '$' + entry.toFixed(2);
      document.getElementById('modalExit').textContent = '$' + exit.toFixed(2);
      document.getElementById('modalHigh').textContent = '$' + high.toFixed(2);
      document.getElementById('modalLow').textContent = '$' + low.toFixed(2);
      document.getElementById('modalShares').textContent = shares.toFixed(0);
      document.getElementById('modalStatus').textContent = (trade.status === 'CLOSED' ? 'CLOSED' : 'OPEN');
      
      const pnlEl = document.getElementById('modalPnL');
      pnlEl.textContent = (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2);
      pnlEl.className = 'modal-field-value ' + (pnl >= 0 ? 'positive' : 'negative');

      const pnlPctEl = document.getElementById('modalPnLPct');
      pnlPctEl.textContent = (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(1) + '%';
      pnlPctEl.className = 'modal-field-value ' + (pnlPct >= 0 ? 'positive' : 'negative');

      document.getElementById('modalMove').textContent = movePercent.toFixed(1) + '%';
      document.getElementById('modalCaptured').textContent = captured.toFixed(1) + '%';
      document.getElementById('modalLeftOnTable').textContent = '$' + leftOnTable.toFixed(2);
      document.getElementById('modalSavedFromLoss').textContent = '$' + savedFromLoss.toFixed(2);

      // Show modal
      document.getElementById('tradeModal').classList.add('active');
    }

    function closeTradeModal() {
      document.getElementById('tradeModal').classList.remove('active');
      currentModalTradeId = null;
    }

    function deleteTradeFromModal() {
      if (!currentModalTradeId) return;

      const trades = JSON.parse(localStorage.getItem('tradeos_journal') || '[]');
      const trade = trades.find(t => t.id === currentModalTradeId);
      
      if (confirm(`Delete ${trade.ticker} trade? This cannot be undone.`)) {
        const updated = trades.filter(t => t.id !== currentModalTradeId);
        localStorage.setItem('tradeos_journal', JSON.stringify(updated));
        closeTradeModal();
        loadTrades();
      }
    }

    // ===== CSV FUNCTIONS =====
    function openAddTradeModal() {
      alert('Add Trade modal coming soon — for now, use bulk upload or manual entry');
    }

    function handleBulkUpload() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.csv';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          // Parse CSV — coming soon
          alert('CSV parsing coming soon');
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function exportToCSV() {
      const trades = JSON.parse(localStorage.getItem('tradeos_journal') || '[]');
      if (trades.length === 0) {
        alert('No trades to export');
        return;
      }

      // Build CSV headers
      const headers = ['Ticker', 'Entry', 'Exit', 'Shares', 'P&L', 'Return %', 'High', 'Low', 'Move %', 'Captured %', 'Status', 'Date'];

      // Build CSV rows
      const rows = trades.map(t => {
        const entry = parseFloat(t.entryPrice || t.entry || 0);
        const exit = parseFloat(t.currentPrice || t.exit || entry);
        const shares = parseFloat(t.shares || 0);
        const high = parseFloat(t.high || exit);
        const low = parseFloat(t.low || entry);

        const pnl = (exit - entry) * shares;
        const pnlPct = entry > 0 ? ((pnl / (entry * shares)) * 100) : 0;

        const movePercent = entry > 0 ? ((high - entry) / entry * 100) : 0;
        const maxPossible = entry > 0 ? ((high - entry) / entry * 100) : 0;
        const actualMove = entry > 0 ? ((exit - entry) / entry * 100) : 0;
        const captured = maxPossible > 0 ? (actualMove / maxPossible * 100) : 0;

        const date = new Date(t.closedAt || t.timestamp || Date.now()).toLocaleDateString();

        return [
          t.ticker || 'N/A',
          entry.toFixed(2),
          exit.toFixed(2),
          shares.toFixed(0),
          pnl.toFixed(2),
          pnlPct.toFixed(1),
          high.toFixed(2),
          low.toFixed(2),
          movePercent.toFixed(1),
          captured.toFixed(1),
          (t.status === 'CLOSED' ? 'CLOSED' : 'OPEN'),
          date
        ];
      });

      // Create CSV string
      const csvContent = [
        headers.join(','),
        ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
      ].join('\n');

      // Download
      const blob = new Blob([csvContent], { type: 'text/csv' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `trades-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      window.URL.revokeObjectURL(url);
    }

    // Close modal on overlay click
    document.addEventListener('click', (e) => {
      const modal = document.getElementById('tradeModal');
      if (e.target === modal) {
        closeTradeModal();
      }
    });

    function goHome() {
      window.location.href = '/tradeos/';
    }

    function goProfile() {
      window.location.href = '/tradeos/settings.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadTrades();
      // Update live prices every 5 seconds
      setInterval(async () => {
        const trades = JSON.parse(localStorage.getItem('tradeos_journal') || '[]');
        const activeTrades = trades.filter(t => t.status === 'ACTIVE' || t.status === 'OPEN');
          let updated = false;
          
          for (const t of activeTrades) {
            const livePrice = await fetchLivePrice(t.ticker);
            if (livePrice && livePrice !== t.currentPrice) {
              t.currentPrice = livePrice;
              t.high = Math.max(t.high, livePrice);
              t.low = Math.min(t.low, livePrice);
              updated = true;
            }
          }

          if (updated) {
            localStorage.setItem('tradeos_journal', JSON.stringify(trades));
            loadTrades();
          }
      }, 5000);
    });
  </script>
