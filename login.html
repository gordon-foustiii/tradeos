<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeOS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        button {
            padding: 14px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .status {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .status-item:last-child {
            margin-bottom: 0;
        }

        .status-label {
            color: #aaa;
        }

        .status-value {
            color: #fff;
            font-weight: 600;
        }

        .indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .indicator.online {
            background: #4ade80;
        }

        .indicator.offline {
            background: #ef4444;
        }

        .indicator.progress {
            background: #eab308;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚔️ TRADEOS</div>
        <h1>Trading OS</h1>
        <p class="subtitle">Viking-branded trading platform for systematic penny stock trading and portfolio management.</p>

        <div class="button-group">
            <button class="btn-primary" onclick="signInGoogle()" style="display:flex;align-items:center;justify-content:center;gap:10px">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>
            <button class="btn-secondary" onclick="handleInfo()">Learn More</button>
        </div>

        <div class="status">
            <div class="status-item">
                <span class="status-label"><span class="indicator online"></span>Worker</span>
                <span class="status-value" id="worker-status">Checking...</span>
            </div>
            <div class="status-item">
                <span class="status-label"><span class="indicator progress"></span>Scanner</span>
                <span class="status-value">Work in Progress</span>
            </div>
            <div class="status-item">
                <span class="status-label"><span class="indicator progress"></span>Playbook</span>
                <span class="status-value">Work in Progress</span>
            </div>
            <div class="status-item">
                <span class="status-label"><span class="indicator offline"></span>Journal</span>
                <span class="status-value">Coming Soon</span>
            </div>
            <div class="status-item">
                <span class="status-label"><span class="indicator offline"></span>Tools</span>
                <span class="status-value">Coming Soon</span>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'tradeos-proxy.gordon-foustiii.workers.dev';
        const CLIENT_ID = '421306806975-bnktjac5i2g8js8sadr8lrfdtm0age02.apps.googleusercontent.com';
        const REDIRECT_URI = 'https://gordon-foustiii.github.io/tradeos/auth.html';

        // Check if already logged in
        function checkAuth() {
            const token = localStorage.getItem('tradeos_id_token');
            const expiry = localStorage.getItem('tradeos_token_expiry');
            
            if (token && expiry && Date.now() < parseInt(expiry)) {
                // Token valid, redirect to dashboard
                window.location.href = '/tradeos/dashboard.html';
                return true;
            }
            
            // Clear expired tokens
            localStorage.removeItem('tradeos_id_token');
            localStorage.removeItem('tradeos_access_token');
            localStorage.removeItem('tradeos_token_expiry');
            return false;
        }

        // Check worker health (disabled - comment in when worker URL is correct)
        // fetch(`${WORKER_URL}/scan/latest`)
        //     .then(() => {
        //         document.getElementById('worker-status').textContent = 'Online';
        //     })
        //     .catch(() => {
        //         document.getElementById('worker-status').textContent = 'Offline';
        //         document.querySelector('.indicator.online').classList.add('offline');
        //     });

        function signInGoogle() {
            var params = new URLSearchParams({
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                response_type: 'code',
                scope: 'openid email profile',
                access_type: 'offline',
                prompt: 'consent'
            });
            window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
        }

        function handleInfo() {
            alert('TradeOS v2 - Coming Soon\n\nFeatures in development:\n• Scanner\n• Trade Journal\n• Playbook\n• Performance Analytics');
        }

        // Run auth check on load
        checkAuth();
    </script>
</body>
</html>
