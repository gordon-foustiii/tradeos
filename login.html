<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>TradeOS — Sign In</title>
  <link rel="manifest" href="/tradeos/manifest.json">
  <link rel="stylesheet" href="/tradeos/css/app.css">
  <style>
    .login-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .logo { font-size: 48px; font-weight: 800; color: #e8e8f0; letter-spacing: -1px; margin-bottom: 8px; }
    .logo span { color: #7f5af0; }
    .tagline { font-size: 15px; color: rgba(255,255,255,0.4); margin-bottom: 48px; text-align: center; }
    .signin-btn { display: flex; align-items: center; gap: 12px; padding: 16px 28px; background: white; color: #333; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; max-width: 320px; justify-content: center; font-family: inherit; }
    .signin-btn:active { opacity: 0.9; transform: scale(0.99); }
    .signin-btn svg { width: 20px; height: 20px; flex-shrink: 0; }
    .divider { font-size: 12px; color: rgba(255,255,255,0.2); margin: 32px 0 16px; text-align: center; }
    .features { display: flex; flex-direction: column; gap: 12px; max-width: 320px; width: 100%; }
    .feature { display: flex; align-items: center; gap: 12px; font-size: 14px; color: rgba(255,255,255,0.5); }
    .feature-dot { width: 8px; height: 8px; border-radius: 50%; background: #7f5af0; flex-shrink: 0; }
  </style>
</head>
<body style="background:#0f0f1a">
  <div class="login-wrap">
    <div class="logo">Trade<span>OS</span></div>
    <div class="tagline">EGFIII Investment Solutions<br>Your personal trading operating system</div>

    <button class="signin-btn" onclick="signIn()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <div class="divider">What you get</div>

    <div class="features">
      <div class="feature"><div class="feature-dot"></div>Trade journal with full pre/post analysis</div>
      <div class="feature"><div class="feature-dot"></div>Candlestick view of every trade</div>
      <div class="feature"><div class="feature-dot"></div>P&L tracking and performance stats</div>
      <div class="feature"><div class="feature-dot"></div>Position sizing calculator</div>
      <div class="feature"><div class="feature-dot"></div>Your data is yours — stored privately</div>
    </div>
  </div>

  <script>
    var CLIENT_ID = '421306806975-bnktjac5i2g8js8sadr8lrfdtm0age02.apps.googleusercontent.com';
    var REDIRECT_URI = 'https://gordon-foustiii.github.io/tradeos/auth.html';

    function signIn() {
      var params = new URLSearchParams({
        client_id: CLIENT_ID,
        redirect_uri: REDIRECT_URI,
        response_type: 'code',
        scope: 'openid email profile',
        access_type: 'offline',
        prompt: 'consent'
      });
      window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
    }

    var token = localStorage.getItem('tradeos_id_token');
    var expiry = localStorage.getItem('tradeos_token_expiry');
    if (token && expiry && Date.now() < parseInt(expiry)) {
      window.location.href = '/tradeos/';
    }
  </script>
</body>
</html>
