<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Playbook — TradeOS</title>
  <link rel="manifest" href="/tradeos/manifest.json">
  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      background-attachment: fixed;
      color: #fff;
      line-height: 1.5;
      min-height: 100vh;
      padding-bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 768px) {
      body {
        padding-bottom: 100px;
      }
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 72px;
      flex-shrink: 0;
    }

    .topbar-brand {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
    }

    .topbar-brand span {
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-menu {
      display: flex;
      gap: 12px;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      cursor: pointer;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 18px;
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffd93d;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-icon svg {
      width: 20px;
      height: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
      width: 100%;
    }

    .header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 14px;
      color: #aaa;
    }

    .content {
      background: transparent;
      border: none;
      padding: 0;
      text-align: center;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .content.empty {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 40px 20px;
    }

    .content-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .content-text {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .content-subtext {
      font-size: 14px;
      color: #666;
    }

    .footer-nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 4px;
      background: rgba(0, 0, 0, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .nav-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 4px;
      text-decoration: none;
      color: #aaa;
      border-radius: 8px;
      transition: all 0.2s;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .nav-link svg {
      width: 20px;
      height: 20px;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ffd93d;
    }

    .nav-link.active {
      background: rgba(255, 255, 255, 0.05);
      color: #ffd93d;
      border-bottom: 2px solid #ffd93d;
    }

    .plays-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .play-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      cursor: pointer;
    }

    .play-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-4px);
    }

    .play-chart {
      height: 200px;
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .play-info {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .play-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }

    .play-ticker {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }

    .play-status {
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255, 182, 193, 0.2);
      color: #ffb6c1;
      text-transform: uppercase;
      font-weight: 600;
    }

    .play-status.active {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .play-price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      color: #aaa;
    }

    .play-label {
      color: #888;
      font-weight: 500;
    }

    .play-value {
      color: #fff;
      font-weight: 600;
    }

    .play-value.positive {
      color: #22c55e;
    }

    .play-value.negative {
      color: #ff6b6b;
    }

    .play-catalyst {
      margin-top: 8px;
      padding: 8px;
      background: rgba(255, 182, 193, 0.1);
      border-left: 2px solid #ffb6c1;
      border-radius: 4px;
      font-size: 12px;
      color: #ffb6c1;
      text-overflow: ellipsis;
      overflow: hidden;
      max-height: 40px;
    }

    .play-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .play-btn {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #aaa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .play-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffd93d;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .play-btn.delete {
      color: #ff6b6b;
      border-color: rgba(255, 107, 107, 0.2);
    }

    .play-btn.delete:hover {
      background: rgba(255, 107, 107, 0.1);
      border-color: rgba(255, 107, 107, 0.3);
    }

    /* ========== MODALS ========== */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .modal.active {
      display: flex;
      opacity: 1;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: rgba(20, 20, 20, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
    }

    .modal-close {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: #fff;
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .modal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .modal-row:last-child {
      border-bottom: none;
    }

    .modal-label {
      color: #888;
      font-size: 13px;
      font-weight: 500;
    }

    .modal-value {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 211, 61, 0.3);
      box-shadow: 0 0 0 2px rgba(255, 211, 61, 0.1);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-primary {
      flex: 1;
      padding: 10px 16px;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      color: #000;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 211, 61, 0.2);
    }

    .btn-secondary {
      flex: 1;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.05);
      color: #aaa;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .time-display {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand" onclick="goHome()">
      TradeOS <span>⚡</span>
    </div>
    <div class="topbar-menu">
      <button class="btn-icon" onclick="goProfile()" title="Profile">⚙️</button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div class="page-title">Playbook</div>
      <div class="page-subtitle">Planned plays ready to execute</div>
    </div>
    <div id="playsContainer" class="content"></div>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title"><span id="detailTicker"></span> Plan</div>
        <button class="modal-close" onclick="closeDetailModal()">✕</button>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Scanner Hit</div>
        <div class="modal-row">
          <div class="modal-label">First Hit</div>
          <div>
            <div class="modal-value" id="detailScannerTime">—</div>
            <div class="time-display" id="detailScannerTimeAgo"></div>
          </div>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Planned Entry & Targets</div>
        <div class="modal-row">
          <div class="modal-label">Entry</div>
          <div class="modal-value" id="detailEntry">—</div>
        </div>
        <div class="modal-row">
          <div class="modal-label">Target</div>
          <div class="modal-value" id="detailTarget">—</div>
        </div>
        <div class="modal-row">
          <div class="modal-label">Stop Loss</div>
          <div class="modal-value" id="detailStop">—</div>
        </div>
        <div class="modal-row">
          <div class="modal-label">Risk/Reward</div>
          <div class="modal-value" id="detailRR">—</div>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Catalyst</div>
        <div class="form-group">
          <textarea id="detailCatalyst" class="form-input" rows="3" placeholder="Add or update catalyst..."></textarea>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-primary" onclick="submitDetailSave()">Save</button>
        <button class="btn-secondary" onclick="closeDetailModal()">Close</button>
      </div>
    </div>
  </div>

  <!-- Execute Modal -->
  <div id="executeModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">Execute <span id="modalTicker"></span></div>
        <button class="modal-close" onclick="closeExecuteModal()">✕</button>
      </div>

      <div class="modal-section">
        <div class="modal-row">
          <div class="modal-label">Current Price</div>
          <div class="modal-value" id="modalCurrentPrice">—</div>
        </div>
      </div>

      <div class="form-group">
        <div class="form-label">Entry Price</div>
        <input type="number" id="entryPrice" class="form-input" step="0.01" placeholder="0.00">
      </div>

      <div class="form-group">
        <div class="form-label">Target Exit</div>
        <input type="number" id="targetExit" class="form-input" step="0.01" placeholder="0.00">
      </div>

      <div class="form-group">
        <div class="form-label">Stop Loss</div>
        <input type="number" id="stopLoss" class="form-input" step="0.01" placeholder="0.00">
      </div>

      <div class="form-group">
        <div class="form-label">Shares</div>
        <input type="number" id="shares" class="form-input" placeholder="0" min="1">
      </div>

      <div class="form-group">
        <div class="form-label">Notes (optional)</div>
        <textarea id="tradeNotes" class="form-input" rows="3" placeholder="Trade notes..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn-primary" onclick="submitExecuteTrade()">Execute Trade</button>
        <button class="btn-secondary" onclick="closeExecuteModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="footer-nav">
    <a href="/tradeos/" class="nav-link active">
      <span>📊</span>
      Dashboard
    </a>
    <a href="/tradeos/scanner.html" class="nav-link">
      <span>🔍</span>
      Scanner
    </a>
    <a href="/tradeos/plays.html" class="nav-link">
      <span>📋</span>
      Playbook
    </a>
    <a href="/tradeos/journal.html" class="nav-link">
      <span>📔</span>
      Journal
    </a>
  </div>

  <script>
    // ========== DETAIL MODAL ==========
    let currentDetailPlayId = null;

    function openDetailModal(id) {
      const plays = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
      const play = plays.find(p => p.id === id);
      if (!play) return;

      currentDetailPlayId = id;
      
      // Populate fields
      document.getElementById('detailTicker').textContent = play.ticker;
      
      // Scanner hit time
      const scanTime = new Date(play.createdAt || Date.now());
      document.getElementById('detailScannerTime').textContent = scanTime.toLocaleString();
      
      // Time ago
      const now = new Date();
      const diff = now - scanTime;
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(mins / 60);
      const days = Math.floor(hours / 24);
      let timeAgo = '';
      if (days > 0) timeAgo = `${days}d ago`;
      else if (hours > 0) timeAgo = `${hours}h ago`;
      else if (mins > 0) timeAgo = `${mins}m ago`;
      else timeAgo = 'now';
      document.getElementById('detailScannerTimeAgo').textContent = timeAgo;
      
      // Entry/Target/Stop
      document.getElementById('detailEntry').textContent = play.entry ? '$' + play.entry.toFixed(2) : 'N/A';
      document.getElementById('detailTarget').textContent = play.target ? '$' + play.target.toFixed(2) : 'N/A';
      document.getElementById('detailStop').textContent = play.stop ? '$' + play.stop.toFixed(2) : 'N/A';
      
      // Risk/Reward ratio
      if (play.entry && play.target && play.stop) {
        const risk = play.entry - play.stop;
        const reward = play.target - play.entry;
        const ratio = reward / risk;
        document.getElementById('detailRR').textContent = ratio.toFixed(2) + ':1';
      } else {
        document.getElementById('detailRR').textContent = 'N/A';
      }
      
      // Catalyst
      document.getElementById('detailCatalyst').value = play.catalyst || '';
      
      document.getElementById('detailModal').classList.add('active');
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('active');
      currentDetailPlayId = null;
    }

    function submitDetailSave() {
      const plays = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
      const play = plays.find(p => p.id === currentDetailPlayId);
      if (!play) return;

      play.catalyst = document.getElementById('detailCatalyst').value;
      localStorage.setItem('tradeos_plays', JSON.stringify(plays));
      syncPlaysToDrive();
      loadPlays();
      closeDetailModal();
    }

    // ========== EXECUTE MODAL (EXISTING) ==========
    let currentPlayId = null;

    function openExecuteModal(id, e) {
      e.stopPropagation();
      const plays = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
      const play = plays.find(p => p.id === id);
      if (!play) return;

      currentPlayId = id;
      document.getElementById('modalTicker').textContent = play.ticker;
      document.getElementById('modalCurrentPrice').textContent = '$' + play.price.toFixed(2);
      document.getElementById('entryPrice').value = play.price.toFixed(2);
      document.getElementById('targetExit').value = play.target ? play.target.toFixed(2) : '';
      document.getElementById('stopLoss').value = play.stop ? play.stop.toFixed(2) : '';
      document.getElementById('shares').value = play.shares || '';
      document.getElementById('tradeNotes').value = '';

      document.getElementById('executeModal').classList.add('active');
    }

    function closeExecuteModal() {
      document.getElementById('executeModal').classList.remove('active');
      currentPlayId = null;
    }

    function submitExecuteTrade() {
      const plays = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
      const play = plays.find(p => p.id === currentPlayId);
      if (!play) return;

      const entryPrice = parseFloat(document.getElementById('entryPrice').value);
      const targetExit = parseFloat(document.getElementById('targetExit').value);
      const stopLoss = parseFloat(document.getElementById('stopLoss').value);
      const shares = parseInt(document.getElementById('shares').value);
      const notes = document.getElementById('tradeNotes').value;

      if (!entryPrice || !shares || !targetExit || !stopLoss) {
        alert('Please fill in all required fields');
        return;
      }

      const maxLoss = shares * (entryPrice - stopLoss);
      if (maxLoss > 50) {
        alert(`Max loss is $${maxLoss.toFixed(2)} — exceeds $50 limit`);
        return;
      }

      // Create journal entry
      const journal = JSON.parse(localStorage.getItem('tradeos_journal') || '[]');
      const trade = {
        id: Date.now(),
        ticker: play.ticker,
        entryPrice,
        targetExit,
        stopLoss,
        shares,
        notes,
        currentPrice: play.price,
        high: play.price,
        low: play.price,
        executedAt: new Date().toISOString(),
        status: 'ACTIVE'
      };
      journal.push(trade);
      localStorage.setItem('tradeos_journal', JSON.stringify(journal));

      // Remove from plays
      const updated = plays.filter(p => p.id !== currentPlayId);
      localStorage.setItem('tradeos_plays', JSON.stringify(updated));

      closeExecuteModal();
      syncPlaysToDrive();
      loadPlays();
      alert('Trade executed! Check Journal to track.');
    }

    function loadPlays() {
      const plays = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
      const container = document.getElementById('playsContainer');
      
      if (plays.length === 0) {
        container.className = 'content empty';
        container.innerHTML = `
          <div class="content-icon">...</div>
          <div class="content-text">No Plays Yet</div>
          <div class="content-subtext">Add plays from the Scanner to get started</div>
        `;
        return;
      }

      container.className = 'plays-grid';
      container.innerHTML = plays.map(p => `
        <div class="play-card" id="card-${p.id}" onclick="openDetailModal(${p.id})">
          <div class="play-chart" id="chart-wrapper-${p.id}">
            <img src="https://finviz.com/chart.ashx?tv=151&t=${p.ticker}" style="width:100%;height:100%;object-fit:contain;background:#000;" alt="${p.ticker} chart" />
          </div>
          <div class="play-info">
            <div class="play-header">
              <div class="play-ticker">${p.ticker}</div>
              <div class="play-status">WATCH</div>
            </div>
            <div class="play-price-row">
              <span class="play-label">Price</span>
              <span class="play-value">$${p.price.toFixed(2)}</span>
            </div>
            <div class="play-price-row">
              <span class="play-label">Target</span>
              <span class="play-value">${p.target ? '$' + p.target.toFixed(2) : 'N/A'}</span>
            </div>
            <div class="play-price-row">
              <span class="play-label">Change</span>
              <span class="play-value ${p.price > p.entry ? 'positive' : 'negative'}">
                ${((p.price - p.entry) / p.entry * 100).toFixed(1)}%
              </span>
            </div>
            ${p.catalyst ? `<div class="play-catalyst"><strong>Catalyst:</strong> ${p.catalyst}</div>` : ''}
            <div class="play-actions">
              <button class="play-btn" onclick="openExecuteModal(${p.id}, event)">Execute</button>
              <button class="play-btn delete" onclick="deletePlay(${p.id}, event)">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function deletePlay(id, e) {
      e.stopPropagation();
      if (confirm('Delete this play?')) {
        let plays = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
        plays = plays.filter(p => p.id !== id);
        localStorage.setItem('tradeos_plays', JSON.stringify(plays));
        syncPlaysToDrive();
        loadPlays();
      }
    }

    // ========== GOOGLE DRIVE SYNC ==========
    const DRIVE_FILE_ID = 'tradeos_plays.json';
    
    async function syncPlaysFromDrive() {
      try {
        const token = localStorage.getItem('tradeos_access_token');
        if (!token) return;
        
        const listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_ID}'&spaces=appDataFolder&fields=files(id)`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const files = (await listRes.json()).files || [];
        if (!files.length) return;
        
        const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${files[0].id}?alt=media`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const driveData = await fileRes.json();
        const local = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
        const drive = driveData.plays || [];
        
        const merged = {};
        [...local, ...drive].forEach(p => {
          if (!merged[p.id] || new Date(p.createdAt) > new Date(merged[p.id].createdAt)) {
            merged[p.id] = p;
          }
        });
        
        const result = Object.values(merged);
        localStorage.setItem('tradeos_plays', JSON.stringify(result));
      } catch (e) {
        console.error('Drive sync read plays:', e);
      }
    }

    async function syncPlaysToDrive() {
      try {
        const token = localStorage.getItem('tradeos_access_token');
        if (!token) return;
        
        const payload = {
          plays: JSON.parse(localStorage.getItem('tradeos_plays') || '[]'),
          lastUpdated: new Date().toISOString()
        };
        
        const listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_ID}'&spaces=appDataFolder&fields=files(id)`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const fileId = (await listRes.json()).files?.[0]?.id;
        
        if (fileId) {
          await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        }
      } catch (e) {
        console.error('Drive sync write plays:', e);
      }
    }

    function goHome() {
      window.location.href = '/tradeos/';
    }

    function goProfile() {
      window.location.href = '/tradeos/settings.html';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await syncPlaysFromDrive();
      loadPlays();
      setInterval(syncPlaysToDrive, 30000);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeDetailModal();
        closeExecuteModal();
      }
    });
  </script>
</body>
</html>
