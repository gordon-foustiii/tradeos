<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Playbook — TradeOS</title>
  <link rel="manifest" href="/tradeos/manifest.json">
  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      background-attachment: fixed;
      color: #fff;
      line-height: 1.5;
      min-height: 100vh;
      padding-bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 768px) {
      body {
        padding-bottom: 100px;
      }
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 72px;
      flex-shrink: 0;
    }

    .topbar-brand {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
    }

    .topbar-brand span {
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-menu {
      display: flex;
      gap: 12px;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      cursor: pointer;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 18px;
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffd93d;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-icon svg {
      width: 20px;
      height: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
      width: 100%;
    }

    .header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 14px;
      color: #aaa;
    }

    .content {
      background: transparent;
      border: none;
      padding: 0;
      text-align: center;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .content.empty {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 40px 20px;
    }

    .content-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .content-text {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .content-subtext {
      font-size: 14px;
      color: #666;
    }

    .footer-nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 4px;
      background: rgba(0, 0, 0, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .nav-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 4px;
      text-decoration: none;
      color: #aaa;
      border-radius: 8px;
      transition: all 0.2s;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .nav-link svg {
      width: 20px;
      height: 20px;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ffd93d;
    }

    .nav-link.active {
      background: rgba(255, 255, 255, 0.05);
      color: #ffd93d;
      border-bottom: 2px solid #ffd93d;
    }

    .plays-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .play-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .play-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-4px);
    }

    .play-chart {
      height: 160px;
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .play-info {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .play-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }

    .play-ticker {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }

    .play-status {
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
      font-weight: 600;
    }

    .play-price-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .play-label {
      color: #888;
    }

    .play-value {
      color: #fff;
      font-weight: 600;
    }

    .play-value.positive {
      color: #4ade80;
    }

    .play-value.negative {
      color: #ff6b6b;
    }

    .play-catalyst {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 8px;
      margin-top: 8px;
      font-size: 11px;
      color: #aaa;
      line-height: 1.3;
      max-height: 50px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .play-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .play-btn {
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .play-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .play-btn.delete {
      background: rgba(255, 107, 107, 0.1);
      border-color: rgba(255, 107, 107, 0.3);
      color: #ff6b6b;
    }

    .play-btn.delete:hover {
      background: rgba(255, 107, 107, 0.2);
    }

    /* ===== MODAL STYLES ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-close {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 24px;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      color: #ffd93d;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 212, 157, 0.3);
    }

    .form-input::placeholder {
      color: #666;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-execute {
      padding: 12px 16px;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      border: none;
      border-radius: 6px;
      color: #0f0f0f;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .btn-execute:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 107, 107, 0.3);
    }

    .btn-cancel {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .btn-cancel:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand" onclick="goHome()" style="cursor: pointer;">
      TRADEOS
    </div>
    <div class="topbar-menu">
      <button class="btn-icon" onclick="goProfile()" title="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div class="page-title">Playbook</div>
      <div class="page-subtitle">Your active trading plays</div>
    </div>

    <div id="playsContainer" class="content">
      <div class="content-icon">📋</div>
      <div class="content-text">No Plays Yet</div>
      <div class="content-subtext">Add plays from the Scanner to get started</div>
    </div>

    <div class="footer-nav">
      <a href="/tradeos/scanner.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Scanner
      </a>
      <a href="/tradeos/plays.html" class="nav-link active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Plays
      </a>
      <a href="/tradeos/journal.html" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Journal
      </a>
      <a href="/tradeos/tools.html" class="nav-link">

        Tools
      </a>
    </div>
  </div>

  <!-- EXECUTE MODAL -->
  <div id="executeModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        Execute Trade
        <button class="modal-close" onclick="closeExecuteModal()">×</button>
      </div>

      <div class="form-group">
        <div class="form-label">Ticker</div>
        <div class="form-input" id="modalTicker" style="padding: 10px 12px; cursor: default; background: rgba(255, 255, 255, 0.03);"></div>
      </div>

      <div class="form-group">
        <div class="form-label">Current Price</div>
        <div class="form-input" id="modalCurrentPrice" style="padding: 10px 12px; cursor: default; background: rgba(255, 255, 255, 0.03);"></div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Entry Price</label>

      <div class="form-row">

      <div style="background: rgba(255, 107, 107, 0.1); border: 1px solid rgba(255, 107, 107, 0.2); border-radius: 6px; padding: 12px; font-size: 12px; color: #ff9999; margin-bottom: 16px;">
        💡 $50 max loss rule: Ensure shares × (entry - stop loss) ≤ $50<br>
        📊 Live prices include pre-market (4am) and after-hours (8pm) EST
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeExecuteModal()">Cancel</button>
        <button class="btn-execute" onclick="submitExecuteTrade()">Execute</button>

  <script>
    // ========== CHART MANAGEMENT WITH LIVE DATA ==========
    const charts = {};
    const chartData = {};
    
    // Your existing scanner worker (combined with extended hours endpoints)
    // Update this with your actual worker URL from Cloudflare dashboard
    const WORKER_URL = 'https://tradeos-proxy.gordon-foustiii.workers.dev';

    async function fetchChartData(ticker) {
      try {
        console.log(`📊 Fetching bars for ${ticker}...`);
        
        // Call worker /bars endpoint (routes to Polygon with CORS enabled)
        const res = await fetch(`${WORKER_URL}/bars/${ticker}`);
        
        if (!res.ok) {
          console.error(`Worker returned ${res.status}`);
          return generateMockChartData();
        }

        const data = await res.json();
        
        if (data.error) {
          console.error(`Worker error: ${data.error}`);
          return generateMockChartData();
        }

        if (!data.bars || data.bars.length === 0) {
          console.warn(`No bars in worker response`);
          return generateMockChartData();
        }

        console.log(`✓ Loaded ${data.count} bars for ${ticker} from ${data.source} (extended hours)`);
        return data.bars;
      } catch (e) {
        console.error('Chart data fetch failed:', e.message);
        return generateMockChartData();
      }
    }

    async function fetchLivePrice(ticker) {
      try {
        console.log(`💰 Fetching price for ${ticker}...`);
        
        // Call worker /quote endpoint (routes to IEX/Polygon with CORS enabled)
        const res = await fetch(`${WORKER_URL}/quote/${ticker}`);

        if (!res.ok) {
          console.error(`Worker quote returned ${res.status}`);
          return null;
        }

        const data = await res.json();
        
        if (data.error) {
          console.error(`Worker quote error: ${data.error}`);
          return null;
        }

        if (data.price) {
          console.log(`✓ Got price for ${ticker}: $${data.price} from ${data.source}`);
          return {
            price: data.price,
            bid: data.bid,
            ask: data.ask,
            bidSize: data.bidSize,
            askSize: data.askSize,
            high: data.high,
            low: data.low,
            volume: data.volume,
            marketStatus: data.marketStatus,
            timestamp: data.timestamp,
            source: data.source
          };
        }
      } catch (e) {
        console.error('Live price fetch failed:', e.message);
      }
      return null;
    }

    function generateMockChartData() {
      const data = [];
      let basePrice = 5 + Math.random() * 15;
      const now = Math.floor(Date.now() / 1000);
      
      for (let i = 390; i > 0; i--) {
        const time = now - (i * 60);
        const open = basePrice;
        basePrice += (Math.random() - 0.48) * 0.5;
        const close = basePrice;
        const high = Math.max(open, close) + Math.random() * 0.3;
        const low = Math.min(open, close) - Math.random() * 0.3;
        
        data.push({
          time: Math.floor(time),
          open: Math.round(open * 100) / 100,
          high: Math.round(high * 100) / 100,
          low: Math.round(low * 100) / 100,
          close: Math.round(close * 100) / 100,
          volume: Math.floor(Math.random() * 100000) + 10000
        });
      }
      
      return data;
    }

    function initChart(cardElement, ticker, initialPrice) {
      const chartContainer = cardElement.querySelector('.play-chart');
      if (!chartContainer) return;

      const container = document.createElement('div');
      Object.assign(container.style, {
        width: '100%',
        height: '100%',
        backgroundColor: 'transparent'
      });
      chartContainer.appendChild(container);

      const chart = LightweightCharts.createChart(container, {
        layout: { background: { color: 'transparent' }, textColor: '#aaa' },
        width: chartContainer.offsetWidth,
        height: 160,
        timeScale: { timeVisible: true, secondsVisible: false },
      });

      const candleSeries = chart.addCandlestickSeries({
        upColor: '#4ade80',
        downColor: '#ff6b6b',
        borderUpColor: '#4ade80',
        borderDownColor: '#ff6b6b',
        wickUpColor: '#4ade80',
        wickDownColor: '#ff6b6b',
      });

      charts[ticker] = { chart, candleSeries };

      // Fetch live data
      fetchChartData(ticker).then(data => {
        chartData[ticker] = data;
        candleSeries.setData(data);
        chart.timeScale().fitContent();
      }).catch(e => {
        console.error('Failed to init chart for ' + ticker, e);
      });

      // Live price updates every 5 seconds
      const liveInterval = setInterval(async () => {
        const livePrice = await fetchLivePrice(ticker);
        if (livePrice) {
          updatePriceDisplay(cardElement, livePrice.price);
          
          // Update chart if we have data
          if (chartData[ticker] && chartData[ticker].length > 0 && charts[ticker]) {
            const lastBar = chartData[ticker][chartData[ticker].length - 1];
            const now = Math.floor(Date.now() / 1000);
            
            // If new minute started, add new candle
            if (now - lastBar.time >= 60) {
              const newBar = {
                time: now,
                open: livePrice.price,
                high: livePrice.price,
                low: livePrice.price,
                close: livePrice.price,
                volume: 0
              };
              chartData[ticker].push(newBar);
              charts[ticker].candleSeries.update(newBar);
            } else {
              // Update current bar
              lastBar.high = Math.max(lastBar.high, livePrice.price);
              lastBar.low = Math.min(lastBar.low, livePrice.price);
              lastBar.close = livePrice.price;
              charts[ticker].candleSeries.update(lastBar);
            }
          }
        }
      }, 5000);

      // Store interval ID for cleanup
      cardElement.liveInterval = liveInterval;
    }

    function updatePriceDisplay(cardElement, newPrice) {
      const priceRow = cardElement.querySelector('.play-price-row');
      if (priceRow) {
        const priceValue = priceRow.querySelector('.play-value');
        priceValue.textContent = '$' + newPrice.toFixed(2);
      }
    }

    // ========== GOOGLE DRIVE SYNC ==========
    const DRIVE_FILE_ID = 'tradeos_plays.json';
    
    async function syncPlaysFromDrive() {
      try {
        const token = localStorage.getItem('tradeos_access_token');
        if (!token) return;
        
        const listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_ID}'&spaces=appDataFolder&fields=files(id)`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const files = (await listRes.json()).files || [];
        if (!files.length) return;
        
        const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${files[0].id}?alt=media`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const driveData = await fileRes.json();
        const local = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
        const drive = driveData.plays || [];
        
        const merged = {};
        [...local, ...drive].forEach(p => {
          if (!merged[p.id] || new Date(p.createdAt) > new Date(merged[p.id].createdAt)) {
            merged[p.id] = p;
          }
        });
        
        const result = Object.values(merged);
        localStorage.setItem('tradeos_plays', JSON.stringify(result));
      } catch (e) {
        console.error('Drive sync read plays:', e);
      }
    }

    async function syncPlaysToDrive() {
      try {
        const token = localStorage.getItem('tradeos_access_token');
        if (!token) return;
        
        const payload = {
          plays: JSON.parse(localStorage.getItem('tradeos_plays') || '[]'),
          lastUpdated: new Date().toISOString()
        };
        
        const listRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_ID}'&spaces=appDataFolder&fields=files(id)`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        const fileId = (await listRes.json()).files?.[0]?.id;
        
        if (fileId) {
          await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
            method: 'PATCH',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        }
      } catch (e) {
        console.error('Drive sync write plays:', e);
      }
    }

    // ========== EXECUTE & JOURNAL ==========
    let currentPlayId = null;

    function openExecuteModal(id) {
      const plays = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
      const play = plays.find(p => p.id === id);
      if (!play) return;

      currentPlayId = id;
      document.getElementById('modalTicker').textContent = play.ticker;
      document.getElementById('modalCurrentPrice').textContent = '$' + play.price.toFixed(2);
      document.getElementById('entryPrice').value = play.price.toFixed(2);
      document.getElementById('targetExit').value = play.target ? play.target.toFixed(2) : '';
      document.getElementById('stopLoss').value = play.stop ? play.stop.toFixed(2) : '';
      document.getElementById('shares').value = play.shares || '';
      document.getElementById('tradeNotes').value = '';

      document.getElementById('executeModal').classList.add('active');
    }

    function closeExecuteModal() {
      document.getElementById('executeModal').classList.remove('active');
      currentPlayId = null;
    }

    function submitExecuteTrade() {
      const plays = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
      const play = plays.find(p => p.id === currentPlayId);
      if (!play) return;

      const entryPrice = parseFloat(document.getElementById('entryPrice').value);
      const targetExit = parseFloat(document.getElementById('targetExit').value);
      const stopLoss = parseFloat(document.getElementById('stopLoss').value);
      const shares = parseInt(document.getElementById('shares').value);
      const notes = document.getElementById('tradeNotes').value;

      if (!entryPrice || !shares || !targetExit || !stopLoss) {
        alert('Please fill in all required fields');
        return;
      }

      const maxLoss = shares * (entryPrice - stopLoss);
      if (maxLoss > 50) {
        alert(`Max loss is $${maxLoss.toFixed(2)} — exceeds $50 limit`);
        return;
      }

      // Create journal entry
      const journal = JSON.parse(localStorage.getItem('tradeos_journal') || '[]');
      const trade = {
        id: Date.now(),
        ticker: play.ticker,
        entryPrice,
        targetExit,
        stopLoss,
        shares,
        notes,
        currentPrice: play.price,
        high: play.price,
        low: play.price,
        executedAt: new Date().toISOString(),
        status: 'ACTIVE'
      };
      journal.push(trade);
      localStorage.setItem('tradeos_journal', JSON.stringify(journal));

      // Remove from plays
      const updated = plays.filter(p => p.id !== currentPlayId);
      localStorage.setItem('tradeos_plays', JSON.stringify(updated));

      closeExecuteModal();
      syncPlaysToDrive();
      loadPlays();
      alert('Trade executed! Check Journal to track.');
    }

    function loadPlays() {
      const plays = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
      const container = document.getElementById('playsContainer');
      
      if (plays.length === 0) {
        container.className = 'content empty';
        container.innerHTML = `
          <div class="content-icon">📋</div>
          <div class="content-text">No Plays Yet</div>
          <div class="content-subtext">Add plays from the Scanner to get started</div>
        `;
        return;
      }

      container.className = 'plays-grid';
      container.innerHTML = plays.map(p => `
        <div class="play-card" id="card-${p.id}">
          <div class="play-chart"></div>
          <div class="play-info">
            <div class="play-header">
              <div class="play-ticker">${p.ticker}</div>
              <div class="play-status">WATCH</div>
            </div>
            <div class="play-price-row">
              <span class="play-label">Price</span>
              <span class="play-value">$${p.price.toFixed(2)}</span>
            </div>
            <div class="play-price-row">
              <span class="play-label">Target</span>
              <span class="play-value">${p.target ? '$' + p.target.toFixed(2) : 'N/A'}</span>
            </div>
            <div class="play-price-row">
              <span class="play-label">Change</span>
              <span class="play-value ${p.price > p.entry ? 'positive' : 'negative'}">
                ${((p.price - p.entry) / p.entry * 100).toFixed(1)}%
              </span>
            </div>
            ${p.catalyst ? `<div class="play-catalyst"><strong>Catalyst:</strong> ${p.catalyst}</div>` : ''}
            <div class="play-actions">
              <button class="play-btn" onclick="openExecuteModal(${p.id})">Execute</button>
              <button class="play-btn delete" onclick="deletePlay(${p.id})">Delete</button>
            </div>
          </div>
        </div>
      `).join('');

      // Init charts after DOM is ready
      setTimeout(() => {
        plays.forEach(p => {
          const card = document.getElementById(`card-${p.id}`);
          if (card) initChart(card, p.ticker, p.price);
        });
      }, 100);
    }

    function deletePlay(id) {
      if (confirm('Delete this play?')) {
        let plays = JSON.parse(localStorage.getItem('tradeos_plays') || '[]');
        plays = plays.filter(p => p.id !== id);
        localStorage.setItem('tradeos_plays', JSON.stringify(plays));
        syncPlaysToDrive();
        loadPlays();
      }
    }

    function goHome() {
      window.location.href = '/tradeos/';
    }

    function goProfile() {
      window.location.href = '/tradeos/settings.html';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await syncPlaysFromDrive();
      loadPlays();
      setInterval(syncPlaysToDrive, 30000);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeExecuteModal();
    });
  </script>
</body>
</html>
