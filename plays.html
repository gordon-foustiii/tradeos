<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>TradeOS — Plays</title>
  <link rel="manifest" href="/tradeos/manifest.json">
  <link rel="stylesheet" href="/tradeos/css/app.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand">Trade<span>OS</span></div>
  </div>

  <div class="container">
    <div class="page-header">
      <div class="page-title">Today's Plays</div>
      <div class="page-sub">Active plans from the scanner.</div>
    </div>

    <div id="plays-stats" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px;">
      <div class="stat-card">
        <div class="stat-label">Planned</div>
        <div class="stat-value" id="stat-planned">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Traded</div>
        <div class="stat-value" id="stat-traded">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Skipped</div>
        <div class="stat-value" id="stat-skipped">0</div>
      </div>
    </div>

    <div id="plays-container" class="plays-grid"></div>

    <div class="empty" id="empty-state" style="display: none; text-align: center; padding: 40px 20px;">
      <div style="font-size: 48px; margin-bottom: 12px;">📊</div>
      <div style="font-size: 16px; color: rgba(255,255,255,0.6);">No plays yet.</div>
      <div style="font-size: 13px; color: rgba(255,255,255,0.3); margin-top: 8px;">Run the scanner to create plans.</div>
    </div>
  </div>

  <!-- Play Detail Modal -->
  <div id="play-detail-modal" onclick="if(event.target===this)closePlaysModal()" style="display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 24px 0 40px;">
    <div style="max-width: 500px; margin: 0 auto; padding: 0 16px;">
      <div style="background: #1a1a2e; border-radius: 16px; border: 1px solid rgba(255,255,255,0.08); overflow: hidden;">
        <div style="padding: 20px 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: flex-start;">
          <div>
            <div id="pdm-ticker" style="font-size: 28px; font-weight: 900; color: #e8e8f0;"></div>
            <div id="pdm-catalyst" style="font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px;"></div>
          </div>
          <button onclick="closePlaysModal()" style="background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.6); width: 34px; height: 34px; border-radius: 8px; font-size: 20px; cursor: pointer; font-family: inherit; line-height: 1; padding: 0;">×</button>
        </div>
        <div id="pdm-body" style="padding: 16px 20px 24px; display: flex; flex-direction: column; gap: 12px;"></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script src="/tradeos/js/nav.js"></script>
  <script src="/tradeos/js/api.js"></script>
  <script>
    renderNav('plays');
    const WORKER = 'https://tradeos-proxy.gordon-foustiii.workers.dev';
    const _playsCache = {};

    async function loadPlays() {
      try {
        const res = await fetch(WORKER + '/scan/plans');
        const data = await res.json();
        _playsCache.plays = data.plans || [];
        renderPlays(_playsCache.plays);
      } catch (e) {
        console.error('Error loading plays:', e);
      }
    }

    function renderPlays(plays) {
      const container = document.getElementById('plays-container');
      const emptyState = document.getElementById('empty-state');

      if (!plays || plays.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        updateStats([]);
        return;
      }

      emptyState.style.display = 'none';
      updateStats(plays);

      const sorted = [...plays].sort((a, b) => {
        const statusOrder = { planned: 0, traded: 1, skipped: 2 };
        return (statusOrder[a.status] || 3) - (statusOrder[b.status] || 3);
      });

      container.innerHTML = sorted.map((p, idx) => createPlayCard(p, idx)).join('');
    }

    function createPlayCard(play, idx) {
      const ticker = play.ticker || '?';
      const status = play.status || 'planned';
      const statusColors = { planned: '#7f5af0', traded: '#2cb67d', skipped: '#ef4565' };
      const statusColor = statusColors[status] || '#7f5af0';

      const entry = parseFloat(play.entry) || 0;
      const stop = parseFloat(play.stop) || 0;
      const target = parseFloat(play.target) || 0;
      const rr = entry > 0 && target > entry && stop > 0 ? ((target - entry) / (entry - stop)).toFixed(2) : '—';

      return `
        <div class="play-card" style="background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px; cursor: pointer; transition: all 0.2s; border-left: 4px solid ${statusColor};" onclick="openPlaysModal(${idx})">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
            <div style="font-size: 24px; font-weight: 900; color: #e8e8f0;">${ticker}</div>
            <div style="font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; background: rgba(${statusColor === '#7f5af0' ? '127,90,240' : statusColor === '#2cb67d' ? '44,182,125' : '239,69,101'}, 0.15); color: ${statusColor}; padding: 4px 8px; border-radius: 6px;">${status}</div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px;">
            <div style="background: rgba(255,255,255,0.04); border-radius: 10px; padding: 8px; text-align: center;">
              <div style="font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px;">Entry</div>
              <div style="font-size: 13px; font-weight: 800; color: #e8e8f0;">$${entry.toFixed(2)}</div>
            </div>
            <div style="background: rgba(255,255,255,0.04); border-radius: 10px; padding: 8px; text-align: center;">
              <div style="font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px;">Stop</div>
              <div style="font-size: 13px; font-weight: 800; color: #ef4565;">$${stop.toFixed(2)}</div>
            </div>
            <div style="background: rgba(255,255,255,0.04); border-radius: 10px; padding: 8px; text-align: center;">
              <div style="font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px;">Target</div>
              <div style="font-size: 13px; font-weight: 800; color: #2cb67d;">$${target.toFixed(2)}</div>
            </div>
          </div>

          <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06);">
            <div style="font-size: 11px; color: rgba(255,255,255,0.4);">
              R/R: <span style="color: #e8e8f0; font-weight: 700;">${rr}</span>
            </div>
            <div style="font-size: 11px; color: rgba(255,255,255,0.4);">
              ${play.rating || 'No rating'}
            </div>
          </div>

          <div style="display: flex; gap: 8px; margin-top: 12px;">
            ${status === 'planned' ? `<button onclick="event.stopPropagation(); tradeThis('${ticker}')" style="flex: 1; background: #7f5af0; border: none; color: white; padding: 9px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;">Trade This</button>` : ''}
            <button onclick="event.stopPropagation(); markPlayStatus('${ticker}', 'skipped')" style="flex: 1; background: rgba(239,69,101,0.2); border: 1px solid rgba(239,69,101,0.4); color: #ef4565; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit;">Skip</button>
          </div>
        </div>
      `;
    }

    function updateStats(plays) {
      const planned = plays.filter(p => p.status === 'planned').length;
      const traded = plays.filter(p => p.status === 'traded').length;
      const skipped = plays.filter(p => p.status === 'skipped').length;

      document.getElementById('stat-planned').textContent = planned;
      document.getElementById('stat-traded').textContent = traded;
      document.getElementById('stat-skipped').textContent = skipped;
    }

    function openPlaysModal(idx) {
      const play = _playsCache.plays[idx];
      if (!play) return;

      document.getElementById('pdm-ticker').textContent = play.ticker || '?';
      
      const catalystText = play.catalysts && play.catalysts.length 
        ? play.catalysts.join(', ') + (play.catalystNote ? ': ' + play.catalystNote : '')
        : play.catalystNote || 'No catalyst logged';
      document.getElementById('pdm-catalyst').textContent = catalystText;

      const entry = parseFloat(play.entry) || 0;
      const stop = parseFloat(play.stop) || 0;
      const target = parseFloat(play.target) || 0;
      const rr = entry > 0 && target > entry && stop > 0 ? ((target - entry) / (entry - stop)).toFixed(2) : '—';

      let bodyHTML = `
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
          <div style="background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px; text-align: center;">
            <div style="font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">R/R Ratio</div>
            <div style="font-size: 16px; font-weight: 800; color: #7f5af0;">${rr}</div>
          </div>
          <div style="background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px; text-align: center;">
            <div style="font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">Rating</div>
            <div style="font-size: 14px; font-weight: 800; color: #e8e8f0;">${play.rating || '—'}</div>
          </div>
        </div>

        <div style="background: rgba(255,255,255,0.04); border-radius: 10px; padding: 12px; margin-bottom: 12px;">
          <div style="font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px;">Levels</div>
          <div style="font-size: 14px; color: #e8e8f0; line-height: 1.6;">
            Entry: $${entry.toFixed(2)}<br>
            Stop: $${stop.toFixed(2)}<br>
            Target: $${target.toFixed(2)}
            ${play.support ? '<br>Support: $' + parseFloat(play.support).toFixed(2) : ''}
            ${play.resistance ? '<br>Resistance: $' + parseFloat(play.resistance).toFixed(2) : ''}
          </div>
        </div>
      `;

      if (play.notes) {
        bodyHTML += `
          <div style="background: rgba(255,255,255,0.04); border-radius: 10px; padding: 12px;">
            <div style="font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px;">Notes</div>
            <div style="font-size: 14px; color: #e8e8f0; line-height: 1.5;">${play.notes}</div>
          </div>
        `;
      }

      if (play.status === 'planned') {
        bodyHTML += `
          <button onclick="tradeThis('${play.ticker}')" style="width:100%; background:#7f5af0; border:none; color:white; padding:14px; border-radius:12px; font-size:15px; font-weight:800; cursor:pointer; margin-top:12px; font-family:inherit;">
            Trade This Plan →
          </button>
        `;
      }

      document.getElementById('pdm-body').innerHTML = bodyHTML;
      document.getElementById('play-detail-modal').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function closePlaysModal() {
      document.getElementById('play-detail-modal').style.display = 'none';
      document.body.style.overflow = '';
    }

    function tradeThis(ticker) {
      window.location.href = '/tradeos/journal.html?trade=' + ticker;
    }

    async function markPlayStatus(ticker, status) {
      const plan = _playsCache.plays.find(p => p.ticker === ticker);
      if (!plan) return;

      plan.status = status;
      
      await fetch(WORKER + '/scan/plan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker, plan })
      });
      
      closePlaysModal();
      loadPlays();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlaysModal(); });

    loadPlays();
    setInterval(loadPlays, 30000);
  </script>

  <style>
    .play-card { display: flex; flex-direction: column; }
    .play-card:hover { background: #212135 !important; }
    .plays-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 600px) { .plays-grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); } }
    .stat-card { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; text-align: center; }
    .stat-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 900; color: #7f5af0; }
  </style>
</body>
</html>
