<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Scanner — TradeOS</title>
  <link rel="manifest" href="/tradeos/manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      background-attachment: fixed;
      color: #fff;
      line-height: 1.5;
      min-height: 100vh;
      padding-bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 768px) {
      body {
        padding-bottom: 100px;
      }
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 72px;
      flex-shrink: 0;
    }

    .topbar-brand {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .topbar-brand span {
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-menu {
      display: flex;
      gap: 12px;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      cursor: pointer;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 18px;
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffd93d;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
      width: 100%;
    }

    .header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 14px;
      color: #aaa;
    }

    /* Scanner Controls */
    .scanner-controls {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
    }

    .btn-primary {
      padding: 10px 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: linear-gradient(135deg, #ff6b6b, #ff5252);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      font-size: 14px;
      white-space: nowrap;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 107, 107, 0.3);
    }

    .btn-primary.stop {
      background: linear-gradient(135deg, #5f6d7f, #4a5a6f);
    }

    .btn-secondary {
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      font-size: 14px;
      white-space: nowrap;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .btn-secondary.active {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .scan-status {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: #aaa;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
      animation: pulse-idle 2s infinite;
    }

    .status-dot.ready {
      background: #4ade80;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
      animation: pulse-ready 2s infinite;
    }

    .status-dot.active {
      background: #4ade80;
      animation: pulse-active 1.5s infinite;
    }

    @keyframes pulse-active {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes pulse-ready {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(74, 222, 128, 0.6); }
      50% { opacity: 0.7; box-shadow: 0 0 12px rgba(74, 222, 128, 0.8); }
    }

    @keyframes pulse-idle {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.2; }
    }

    /* Presets */
    .presets-section {
      margin-bottom: 24px;
    }

    .presets-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }

    .presets-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .presets-buttons-inline {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-preset {
      padding: 8px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      color: #aaa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-preset:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .btn-preset.active {
      background: linear-gradient(135deg, rgba(255, 107, 107, 0.2), rgba(255, 157, 77, 0.2));
      border: 1px solid rgba(255, 107, 107, 0.5);
      color: #ffd93d;
    }

    /* Filter Editor */
    #filterEditor {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    #filterEditor.active {
      max-height: 400px;
      overflow-y: auto;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-input-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filter-input {
      flex: 1;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
    }

    .filter-input:focus {
      outline: none;
      border-color: rgba(255, 107, 107, 0.5);
      background: rgba(255, 255, 255, 0.08);
    }

    .filter-value-display {
      font-size: 12px;
      color: #ffd93d;
      font-weight: 600;
      min-width: 45px;
      text-align: right;
    }

    .range-input {
      width: 100%;
      accent-color: #ff6b6b;
    }

    /* Results */
    .results-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 13px;
      color: #aaa;
    }

    .results-empty {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .results-empty p {
      margin: 8px 0;
    }

    .results-empty-sub {
      font-size: 13px;
      color: #555;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .result-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .result-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-4px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .card-ticker {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hit-badge {
      font-size: 11px;
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .card-change {
      font-size: 14px;
      font-weight: 600;
    }

    .card-change.positive {
      color: #4ade80;
    }

    .card-change.negative {
      color: #ff6b6b;
    }

    .card-price {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }

    .card-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .metric-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
    }

    .metric-value.positive {
      color: #4ade80;
    }

    .metric-value.neutral {
      color: #aaa;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    @media (min-width: 768px) {
      .modal-overlay {
        align-items: center;
        justify-content: center;
      }
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(15, 15, 15, 0.95), rgba(26, 26, 26, 0.95));
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px 16px 0 0;
      padding: 28px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @media (min-width: 768px) {
      .modal-content {
        border-radius: 16px;
        width: 90%;
        max-width: 600px;
        max-height: 80vh;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
      gap: 16px;
    }

    .modal-title-block {
      flex: 1;
    }

    .modal-ticker {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }

    .modal-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #aaa;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .modal-section {
      margin-bottom: 24px;
    }

    .modal-section-title {
      font-size: 12px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
    }

    .modal-stat {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .modal-stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .modal-stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .modal-value {
      font-size: 14px;
      font-weight: 600;
    }

    .modal-value.positive {
      color: #4ade80;
    }

    .modal-value.negative {
      color: #ff6b6b;
    }

    .modal-history {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #aaa;
    }

    .history-prices {
      color: #ccc;
    }

    .history-row {
      margin: 4px 0;
    }

    .history-list {
      margin-top: 8px;
    }

    .hit-items {
      margin: 4px 0 0 0;
      padding-left: 12px;
    }

    .hit-item {
      font-size: 11px;
      color: #999;
      margin: 2px 0;
    }

    /* News Section */
    .modal-news {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
    }

    .news-item {
      padding: 10px;
      border-left: 2px solid rgba(255, 107, 107, 0.4);
      margin-bottom: 8px;
    }

    .news-item:last-child {
      margin-bottom: 0;
    }

    .news-title {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .news-time {
      font-size: 11px;
      color: #888;
    }

    .news-source {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }

    .news-placeholder {
      text-align: center;
      color: #666;
      font-size: 12px;
      padding: 20px 10px;
    }

    /* Action Buttons */
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-action {
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-action.primary {
      background: linear-gradient(135deg, #ff6b6b, #ff5252);
      color: #fff;
      border: none;
    }

    .btn-action.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 107, 107, 0.3);
    }

    .btn-action.secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .btn-action.secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    /* Util */
    .text-center {
      text-align: center;
    }

    .mt-2 {
      margin-top: 16px;
    }

    .modal-input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .modal-input-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-input {
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
    }

    .modal-input:focus {
      outline: none;
      border-color: rgba(255, 107, 107, 0.5);
      background: rgba(255, 255, 255, 0.08);
    }

    .toggle-section {
      display: none;
    }

    .toggle-section.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand">
      <span>TradeOS</span>
    </div>
    <div class="topbar-menu">
      <button class="btn-icon" title="Profile" onclick="signOut()">⚙️</button>
      <button class="btn-icon" title="Home" onclick="goHome()">🏠</button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <h1 class="page-title">Scanner</h1>
      <p class="page-subtitle">Pre-market momentum detection</p>
    </div>

    <div class="scanner-controls">
      <button id="scanBtn" class="btn-primary" onclick="toggleScanner()">Scan</button>
      <div class="scan-status">
        <div id="statusDot" class="status-dot"></div>
        <span id="statusText">Ready</span>
      </div>
      <div></div>
      <button id="editToggle" class="btn-secondary" onclick="toggleEditMode()">Edit Filters</button>
    </div>

    <div id="filterEditor" class="filter-editor">
      <div class="filter-grid">
        <div class="filter-group">
          <label class="filter-label">Price Range ($)</label>
          <div class="filter-input-group">
            <input type="number" id="priceMin" class="filter-input" min="0" step="0.01" onchange="updateFilters()" />
            <span class="filter-value-display" id="priceMinVal">$1</span>
          </div>
          <div class="filter-input-group">
            <input type="number" id="priceMax" class="filter-input" min="0" step="0.01" onchange="updateFilters()" />
            <span class="filter-value-display" id="priceMaxVal">$20</span>
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-label">Min Change (%)</label>
          <div class="filter-input-group">
            <input type="number" id="changeMin" class="filter-input" step="0.1" onchange="updateFilters()" />
            <span class="filter-value-display" id="changeMinVal">10%</span>
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-label">Max Float (M)</label>
          <div class="filter-input-group">
            <input type="number" id="floatMax" class="filter-input" step="0.1" onchange="updateFilters()" />
            <span class="filter-value-display" id="floatMaxVal">20M</span>
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-label">Min Rel Vol</label>
          <div class="filter-input-group">
            <input type="number" id="relVolMin" class="filter-input" min="0" step="0.1" onchange="updateFilters()" />
            <span class="filter-value-display" id="relVolMinVal">1.5x</span>
          </div>
        </div>

        <div class="filter-group">
          <label class="filter-label">Min Volume</label>
          <div class="filter-input-group">
            <input type="number" id="volumeMin" class="filter-input" step="10000" onchange="updateFilters()" />
            <span class="filter-value-display" id="volumeMinVal">250K</span>
          </div>
        </div>
      </div>

      <div class="presets-section" style="margin-top: 20px;">
        <span class="presets-label">Presets</span>
        <div class="presets-buttons">
          <button class="btn-preset active" data-preset="standard" onclick="selectPreset('standard')">Standard</button>
          <button class="btn-preset" data-preset="aggressive" onclick="selectPreset('aggressive')">Aggressive</button>
          <button class="btn-preset" data-preset="conservative" onclick="selectPreset('conservative')">Conservative</button>
          <div class="presets-buttons-inline"></div>
        </div>
      </div>
    </div>

    <div class="results-info">
      <span><strong id="resultCount">0</strong> results</span>
      <span id="lastUpdate" style="color: #666;"></span>
    </div>

    <div id="resultsBody" class="results-grid">
      <div class="results-empty">
        <p>No scans yet</p>
        <p class="results-empty-sub">Click "Scan" to begin</p>
      </div>
    </div>
  </div>

  <!-- Ticker Modal -->
  <div id="tickerModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title-block">
          <div class="modal-ticker" id="modalTicker">TICK</div>
          <div class="modal-meta">
            <span id="modalPrice">$0.00</span>
            <span id="modalChange" class="modal-value">+0.00%</span>
          </div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="modal-section">
        <span class="modal-section-title">Metrics</span>
        <div class="modal-grid">
          <div class="modal-stat">
            <div class="modal-stat-label">Volume</div>
            <div class="modal-stat-value" id="modalVolume">0M</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-label">Rel Vol</div>
            <div class="modal-stat-value" id="modalRelVol">0x</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-label">Float</div>
            <div class="modal-stat-value" id="modalFloat">0M</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-label">Mkt Cap</div>
            <div class="modal-stat-value" id="modalMktCap">$0B</div>
          </div>
        </div>
      </div>

      <div class="modal-section" id="tickerHistoryContainer">
        <span class="modal-section-title">Scanner History</span>
        <div class="modal-history">
          <p>Loading...</p>
        </div>
      </div>

      <div class="modal-section">
        <span class="modal-section-title">Relevant News</span>
        <div class="modal-news" id="newsContainer">
          <div class="news-placeholder">
            News integration coming soon
          </div>
        </div>
      </div>

      <div class="modal-input-group">
        <label class="modal-input-label">Add Catalyst (for Play)</label>
        <input type="text" id="catalystInput" class="modal-input" placeholder="e.g., FDA approval, earnings, product launch..." />
      </div>

      <div class="modal-actions">
        <button class="btn-action secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-action primary" onclick="addToPlay()">Add to Play</button>
      </div>
    </div>
  </div>

  <script>
    const FILTERS = {
      standard: { price: { min: 1, max: 20 }, change: { min: 10 }, float: { max: 20e6 }, relVol: { min: 1.5 }, volume: { min: 250000 }, mktCap: { max: 2e9 } },
      aggressive: { price: { min: 0.5, max: 10 }, change: { min: 15 }, float: { max: 15e6 }, relVol: { min: 2.0 }, volume: { min: 300000 }, mktCap: { max: 1.5e9 } },
      conservative: { price: { min: 2, max: 25 }, change: { min: 8 }, float: { max: 25e6 }, relVol: { min: 1.2 }, volume: { min: 200000 }, mktCap: { max: 3e9 } }
    };

    const MOCK_RESULTS = [];

    let state = {
      isScanning: false,
      results: [],
      lastUpdate: null,
      activePreset: 'standard',
      selectedTicker: null,
      currentFilters: { ...FILTERS.standard },
      tickerHistory: {},
      scanInterval: null
    };

    window.addEventListener('DOMContentLoaded', () => {
      loadScannerState();
      loadCustomPresets();
      updateFilterDisplay();
      updatePresetsUI();
      updateStatusDot();
      document.getElementById('presetName').addEventListener('input', (e) => { document.getElementById('saveBtn').disabled = !e.target.value.trim(); });
    });

    function updateStatusDot() {
      const dot = document.getElementById('statusDot');
      if (state.isScanning) {
        dot.classList.remove('ready');
        dot.classList.add('active');
      } else {
        dot.classList.remove('active');
        dot.classList.add('ready');
      }
    }

    function loadScannerState() {
      const saved = localStorage.getItem('tradeos_scanner_state');
      if (saved) {
        const savedState = JSON.parse(saved);
        state.results = savedState.results || [];
        state.lastUpdate = savedState.lastUpdate ? new Date(savedState.lastUpdate) : null;
        state.currentFilters = savedState.currentFilters || state.currentFilters;
        state.tickerHistory = savedState.tickerHistory || {};
        renderResults();
        updateFilterDisplay();
      }
    }

    function saveScannerState() {
      localStorage.setItem('tradeos_scanner_state', JSON.stringify({
        results: state.results,
        lastUpdate: state.lastUpdate,
        currentFilters: state.currentFilters,
        tickerHistory: state.tickerHistory
      }));
    }

    function recordTickerHit(ticker, price) {
      if (!state.tickerHistory[ticker]) {
        state.tickerHistory[ticker] = { totalHits: 0, firstSeen: new Date(), hits: [] };
      }
      state.tickerHistory[ticker].totalHits++;
      state.tickerHistory[ticker].hits.push({ price, timestamp: new Date() });
    }

    function toggleScanner() {
      if (state.isScanning) {
        stopScan();
      } else {
        state.isScanning = true;
        const btn = document.getElementById('scanBtn');
        const txt = document.getElementById('statusText');
        btn.textContent = '⏹ Stop';
        btn.classList.add('stop');
        txt.textContent = 'Scanning...';
        updateStatusDot();
        startScan();
      }
    }

    function startScan() {
      performScan();
    }

    function performScan() {
      setTimeout(() => {
        if (state.isScanning) {
          state.results = MOCK_RESULTS.filter(r => applyFilters(r, state.currentFilters)).sort((a, b) => b.relVol - a.relVol);
          state.results.forEach(r => recordTickerHit(r.ticker, r.price));
          state.lastUpdate = new Date();
          renderResults();
          saveScannerState();
          stopScan();
        }
      }, 300);
    }

    function stopScan() {
      state.isScanning = false;
      const btn = document.getElementById('scanBtn');
      const txt = document.getElementById('statusText');
      btn.textContent = 'Scan';
      btn.classList.remove('stop');
      txt.textContent = 'Ready';
      updateStatusDot();
      if (state.scanInterval) clearInterval(state.scanInterval);
    }

    function applyFilters(t, f) {
      return t.price >= f.price.min && t.price <= f.price.max && t.change >= f.change.min && t.float <= f.float.max && t.relVol >= f.relVol.min && t.volume >= f.volume.min && t.mktCap <= f.mktCap.max;
    }

    function selectPreset(p) {
      state.activePreset = p;
      state.currentFilters = { ...FILTERS[p] };
      updateFilterDisplay();
      updatePresetsUI();
      if (state.isScanning) performScan();
    }

    function updatePresetsUI() {
      document.querySelectorAll('.btn-preset').forEach(b => {
        b.classList.toggle('active', b.dataset.preset === state.activePreset);
      });
    }

    function toggleEditMode() {
      const e = document.getElementById('filterEditor');
      const b = document.getElementById('editToggle');
      e.classList.toggle('active');
      b.classList.toggle('active');
      if (e.classList.contains('active')) updateFilterDisplay();
    }

    function updateFilters() {
      state.currentFilters = {
        price: { min: parseFloat(document.getElementById('priceMin').value) || 1, max: parseFloat(document.getElementById('priceMax').value) || 20 },
        change: { min: parseFloat(document.getElementById('changeMin').value) || 10 },
        float: { max: parseFloat(document.getElementById('floatMax').value) || 20e6 },
        relVol: { min: parseFloat(document.getElementById('relVolMin').value) || 1.5 },
        volume: { min: parseFloat(document.getElementById('volumeMin').value) || 250000 },
        mktCap: state.currentFilters.mktCap
      };
      updateFilterDisplay();
      saveScannerState();
      if (state.isScanning) performScan();
    }

    function updateFilterDisplay() {
      document.getElementById('priceMin').value = state.currentFilters.price.min;
      document.getElementById('priceMax').value = state.currentFilters.price.max;
      document.getElementById('changeMin').value = state.currentFilters.change.min;
      document.getElementById('floatMax').value = state.currentFilters.float.max;
      document.getElementById('relVolMin').value = state.currentFilters.relVol.min;
      document.getElementById('volumeMin').value = state.currentFilters.volume.min;
      document.getElementById('priceMinVal').textContent = `$${state.currentFilters.price.min}`;
      document.getElementById('priceMaxVal').textContent = `$${state.currentFilters.price.max}`;
      document.getElementById('changeMinVal').textContent = `${state.currentFilters.change.min}%`;
      document.getElementById('floatMaxVal').textContent = `${(state.currentFilters.float.max / 1e6).toFixed(1)}M`;
      document.getElementById('relVolMinVal').textContent = `${state.currentFilters.relVol.min}x`;
      document.getElementById('volumeMinVal').textContent = `${(state.currentFilters.volume.min / 1000).toFixed(0)}K`;
    }

    function renderResults() {
      const container = document.getElementById('resultsBody');
      const count = document.getElementById('resultCount');
      const lastUpdate = document.getElementById('lastUpdate');
      if (state.results.length === 0) {
        container.innerHTML = `<div class="results-empty"><p>No results match your filters</p><p class="results-empty-sub">Try broadening the filters or wait for market data</p></div>`;
        return;
      }
      container.innerHTML = state.results.map(r => {
        const history = state.tickerHistory[r.ticker];
        const hitCount = history ? history.totalHits : 0;
        const priceRange = history ? getPriceRange(history.hits) : { min: r.price, max: r.price };
        const changeClass = r.change >= 0 ? 'positive' : 'negative';
        return `<div class="result-card" onclick="showTickerModal('${r.ticker}', ${r.price}, ${r.change}, ${r.volume}, ${r.relVol}, ${r.float}, ${r.mktCap})" title="Hit ${hitCount}x - Range: $${priceRange.min.toFixed(2)}-$${priceRange.max.toFixed(2)}">
          <div class="card-header">
            <div class="card-ticker">${r.ticker}<span class="hit-badge">${hitCount}</span></div>
            <div class="card-change ${changeClass}">${r.change >= 0 ? '+' : ''}${r.change.toFixed(2)}%</div>
          </div>
          <div class="card-price">$${r.price.toFixed(2)}</div>
          <div class="card-metrics">
            <div class="metric-item">
              <div class="metric-label">Volume</div>
              <div class="metric-value">${(r.volume / 1e6).toFixed(2)}M</div>
            </div>
            <div class="metric-item">
              <div class="metric-label">Rel Vol</div>
              <div class="metric-value ${r.relVol >= 1.5 ? 'positive' : 'neutral'}">${r.relVol.toFixed(2)}x</div>
            </div>
            <div class="metric-item">
              <div class="metric-label">Float</div>
              <div class="metric-value ${r.float <= 20e6 ? 'positive' : 'neutral'}">${(r.float / 1e6).toFixed(2)}M</div>
            </div>
            <div class="metric-item">
              <div class="metric-label">Mkt Cap</div>
              <div class="metric-value">$${(r.mktCap / 1e9).toFixed(2)}B</div>
            </div>
          </div>
        </div>`;
      }).join('');
      count.textContent = state.results.length;
      if (state.lastUpdate) lastUpdate.textContent = `Updated ${state.lastUpdate.toLocaleTimeString()}`;
    }

    function getPriceRange(hits) {
      const prices = hits.map(h => h.price);
      return { min: Math.min(...prices), max: Math.max(...prices) };
    }

    function showTickerModal(t, p, c, v, rv, f, mc) {
      state.selectedTicker = { ticker: t, price: p, change: c, volume: v, relVol: rv, float: f, mktCap: mc };
      document.getElementById('modalTicker').textContent = t;
      document.getElementById('modalPrice').textContent = `$${p.toFixed(2)}`;
      document.getElementById('modalChange').textContent = `${c >= 0 ? '+' : ''}${c.toFixed(2)}%`;
      document.getElementById('modalChange').className = `modal-value ${c >= 0 ? 'positive' : 'negative'}`;
      document.getElementById('modalVolume').textContent = `${(v / 1e6).toFixed(2)}M`;
      document.getElementById('modalRelVol').textContent = `${rv.toFixed(2)}x`;
      document.getElementById('modalFloat').textContent = `${(f / 1e6).toFixed(2)}M`;
      document.getElementById('modalMktCap').textContent = `$${(mc / 1e9).toFixed(2)}B`;

      const history = state.tickerHistory[t];
      const historyHTML = history ? `
        <div class="modal-history">
          <div class="history-header">
            <span>Hit Count: ${history.totalHits}</span>
            <span>First Seen: ${new Date(history.firstSeen).toLocaleDateString()}</span>
          </div>
          <div class="history-prices">
            <div class="history-row"><strong>Price Range:</strong> $${Math.min(...history.hits.map(h => h.price)).toFixed(2)} - $${Math.max(...history.hits.map(h => h.price)).toFixed(2)}</div>
            <div class="history-list">
              <strong>Recent Hits:</strong>
              <div class="hit-items">
                ${history.hits.slice(-5).reverse().map(h => `<div class="hit-item">$${h.price.toFixed(2)} - ${new Date(h.timestamp).toLocaleString()}</div>`).join('')}
              </div>
            </div>
          </div>
        </div>
      ` : '<div class="modal-history"><p>No history yet</p></div>';

      document.getElementById('tickerHistoryContainer').innerHTML = historyHTML;
      document.getElementById('catalystInput').value = '';
      document.getElementById('tickerModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('tickerModal').classList.remove('active');
    }

    function addToPlay() {
      const catalyst = document.getElementById('catalystInput').value.trim();
      const msg = catalyst ? `Added ${state.selectedTicker.ticker} to Play with catalyst: "${catalyst}"` : `Added ${state.selectedTicker.ticker} to Play`;
      alert(msg);
      closeModal();
    }

    function loadCustomPresets() {
      const c = JSON.parse(localStorage.getItem('customPresets') || '{}');
      Object.entries(c).forEach(([k, p]) => {
        const btn = document.createElement('button');
        btn.className = 'btn-preset';
        btn.textContent = p.name;
        btn.onclick = () => {
          state.currentFilters = { ...p };
          state.activePreset = k;
          updateFilterDisplay();
          updatePresetsUI();
          if (state.isScanning) performScan();
        };
        btn.dataset.preset = k;
        document.querySelector('.presets-buttons-inline').appendChild(btn);
      });
    }

    function goHome() {
      window.location.href = '/tradeos/';
    }

    function signOut() {
      if (confirm('Sign out of TradeOS?')) {
        localStorage.removeItem('tradeos_id_token');
        localStorage.removeItem('tradeos_access_token');
        localStorage.removeItem('tradeos_token_expiry');
        window.location.href = '/tradeos/login.html';
      }
    }
  </script>
</body>
</html>
