<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Tools — TradeOS</title>
  <link rel="manifest" href="/tradeos/manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
      background-attachment: fixed;
      color: #fff;
      line-height: 1.5;
      min-height: 100vh;
      padding-bottom: 80px;
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 768px) {
      body {
        padding-bottom: 100px;
      }
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #0f0f0f;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      height: 72px;
      flex-shrink: 0;
    }

    .topbar-brand {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
    }

    .topbar-brand span {
      background: linear-gradient(135deg, #ff6b6b, #ffd93d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-menu {
      display: flex;
      gap: 12px;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      cursor: pointer;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 18px;
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffd93d;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn-icon svg {
      width: 20px;
      height: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
      width: 100%;
    }

    .header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 14px;
      color: #aaa;
    }

    .content {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      min-height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .content-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .content-text {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 8px;
    }

    .content-subtext {
      font-size: 14px;
      color: #666;
    }

    .footer-nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 4px;
      background: rgba(0, 0, 0, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .nav-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 4px;
      text-decoration: none;
      color: #aaa;
      border-radius: 8px;
      transition: all 0.2s;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .nav-link svg {
      width: 20px;
      height: 20px;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #ffd93d;
    }

    .nav-link.active {
      background: rgba(255, 255, 255, 0.05);
      color: #ffd93d;
      border-bottom: 2px solid #ffd93d;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand" onclick="goHome()" style="cursor: pointer;">
      TRADEOS
    </div>
    <div class="topbar-menu">
      <button class="btn-icon" onclick="goProfile()" title="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div class="page-title">Tools</div>
      <div class="page-subtitle">Calculators, timers, and trading utilities</div>
    </div>

    <div class="content" style="background: transparent; border: none; padding: 0; min-height: 0;">
      <div id="app" style="width: 100%;"></div>
    </div>

    <script>
      function renderTimerApp() {
        const app = document.getElementById('app');
        app.innerHTML = `
          <div style="width: 100%; max-width: 600px; margin: 0 auto;">
            <!-- TIMER TITLE -->
            <div style="margin-bottom: 24px; text-align: center;">
              <div style="font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px;">Market Timer</div>
              <div style="font-size: 12px; color: #aaa;">Countdown to next event</div>
            </div>

            <!-- UNIFIED TIMER SECTION -->
            <div style="margin-bottom: 32px; text-align: center;">
              <div style="margin-bottom: 20px;">
                <div style="font-size: 56px; font-weight: 900; letter-spacing: -2px; color: #e8e8f0; line-height: 1; font-family: 'Courier New', monospace;" id="timer-clock">--:--:--</div>
                <div style="font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 8px;" id="timer-label">Loading...</div>
                <div style="height: 6px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; margin: 12px auto 0; max-width: 200px;">
                  <div style="height: 100%; border-radius: 4px; transition: width 0.5s linear, background 0.5s;" id="timer-bar"></div>
                </div>
              </div>
              <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 16px;" id="window-badges"></div>
            </div>

            <!-- PRESET TRADING WINDOWS SECTION -->
            <div style="margin-bottom: 32px;">
              
              <!-- Ideal Trading Window -->
              <div id="ideal-section" style="background: rgba(44,182,125,0.1); border: 1px solid rgba(44,182,125,0.3); border-radius: 8px; padding: 16px; margin-bottom: 12px;">
                <div style="font-weight: 500; color: #2cb67d; font-size: 14px; margin-bottom: 12px;">Ideal Trading Window</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                  <div>
                    <label style="display: block; font-size: 13px; color: #aaa; margin-bottom: 6px;">Start</label>
                    <input type="time" id="idealStart" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px;" />
                  </div>
                  <div>
                    <label style="display: block; font-size: 13px; color: #aaa; margin-bottom: 6px;">End</label>
                    <input type="time" id="idealEnd" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px;" />
                  </div>
                </div>
              </div>

              <!-- NO TRADE Window -->
              <div id="notrade-section" style="background: rgba(239,69,101,0.1); border: 1px solid rgba(239,69,101,0.3); border-radius: 8px; padding: 16px; margin-bottom: 16px;">
                <div style="font-weight: 500; color: #ef4565; font-size: 14px; margin-bottom: 12px;">NO TRADE Window</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                  <div>
                    <label style="display: block; font-size: 13px; color: #aaa; margin-bottom: 6px;">Start</label>
                    <input type="time" id="notradeStart" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px;" />
                  </div>
                  <div>
                    <label style="display: block; font-size: 13px; color: #aaa; margin-bottom: 6px;">End</label>
                    <input type="time" id="notradeEnd" style="width: 100%; padding: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px;" />
                  </div>
                </div>
              </div>

            </div>
          </div>
        `;

        // Market events in EST (in order through the day)
        const events = [
          { name: 'London Open', time: '04:30', phase: 'London Trading' },
          { name: 'Premarket Open', time: '07:30', phase: 'Premarket' },
          { name: 'NY Market Open', time: '09:30', phase: 'Market Open' },
          { name: 'NY Market Close', time: '16:00', phase: 'Afterhours' },
          { name: 'Afterhours Close', time: '20:00', phase: 'Closed' }
        ];

        // Preset trading windows (only these two)
        let windows = JSON.parse(localStorage.getItem('tradingWindows')) || {
          ideal: { start: '08:00', end: '11:00' },
          notrade: { start: '09:30', end: '09:45' }
        };

        function getTimeInMinutes(timeStr) {
          const [h, m] = timeStr.split(':').map(Number);
          return h * 60 + m;
        }

        function getCountdownToNextEvent() {
          const now = new Date();
          const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
          const h = et.getHours(), m = et.getMinutes(), s = et.getSeconds();
          const totalMins = h * 60 + m;
          const totalSecs = totalMins * 60 + s;

          // Define event boundaries in seconds
          const LONDON = getTimeInMinutes('04:30') * 60;
          const PREMARKET = getTimeInMinutes('07:30') * 60;
          const OPEN = getTimeInMinutes('09:30') * 60;
          const CLOSE = getTimeInMinutes('16:00') * 60;
          const AFTERHOURS_CLOSE = getTimeInMinutes('20:00') * 60;

          // Determine current phase and next event
          let currentEvent = null;
          let nextEvent = null;
          let nextEventSecs = null;

          if (totalSecs >= LONDON && totalSecs < PREMARKET) {
            currentEvent = events[0]; // London
            nextEvent = events[1];    // Premarket
            nextEventSecs = PREMARKET;
          } else if (totalSecs >= PREMARKET && totalSecs < OPEN) {
            currentEvent = events[1]; // Premarket
            nextEvent = events[2];    // Open
            nextEventSecs = OPEN;
          } else if (totalSecs >= OPEN && totalSecs < CLOSE) {
            currentEvent = events[2]; // Open
            nextEvent = events[3];    // Market Close → Afterhours
            nextEventSecs = CLOSE;
          } else if (totalSecs >= CLOSE && totalSecs < AFTERHOURS_CLOSE) {
            // Afterhours (4pm-8pm)
            currentEvent = events[3]; // Afterhours
            nextEvent = events[4];    // Afterhours Close → Closed
            nextEventSecs = AFTERHOURS_CLOSE;
          } else if (totalSecs >= AFTERHOURS_CLOSE) {
            // Closed (8pm-4:30am next day)
            currentEvent = events[4]; // Closed
            nextEvent = events[0];    // London Open
            nextEventSecs = LONDON + (24 * 3600); // Tomorrow at 4:30am
          } else {
            // Before 4:30am (closed period from 8pm previous day)
            currentEvent = events[4]; // Closed
            nextEvent = events[0];    // London Open
            nextEventSecs = LONDON;
          }

          let diffSecs = nextEventSecs - totalSecs;
          if (diffSecs <= 0) {
            diffSecs += 24 * 3600; // Safety: add a day if somehow negative
          }

          const hours = Math.floor(diffSecs / 3600);
          const mins = Math.floor((diffSecs % 3600) / 60);
          const secs = Math.floor(diffSecs % 60);

          return {
            hours, mins, secs,
            currentEvent,
            nextEvent,
            phase: currentEvent.phase,
            diffSecs,
            totalSecs,
            nextEventSecs,
            totalMins,
            now: { h, m, s }
          };
        }

        function getClockColor(phase) {
          if (phase === 'Closed') return '#ef4565';
          if (phase === 'Afterhours') return '#f4b942'; // amber/orange for afterhours
          if (phase === 'Market Open') return '#2cb67d';
          if (phase === 'Premarket') return '#7f5af0';
          if (phase === 'London Trading') return '#6b9bd1';
          return '#7f5af0';
        }

        function renderTimer() {
          const state = getCountdownToNextEvent();
          const { hours, mins, secs, currentEvent, nextEvent, phase, totalMins } = state;

          const clock = document.getElementById('timer-clock');
          const label = document.getElementById('timer-label');
          const bar = document.getElementById('timer-bar');

          // Format time (HH:MM:SS)
          clock.textContent = String(hours).padStart(2, '0') + ':' + String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
          clock.style.color = getClockColor(phase);

          // Determine label based on phase
          if (phase.includes('Closed')) {
            label.textContent = 'Market closed — next: ' + nextEvent.name.toLowerCase();
          } else if (phase.includes('Afterhours')) {
            label.textContent = 'After hours — next: ' + nextEvent.name.toLowerCase();
          } else if (phase.includes('NO TRADE')) {
            label.textContent = '⚠️ NO TRADE ZONE — ' + nextEvent.name.toLowerCase() + ' in ' + mins + 'm';
          } else if (phase.includes('Market Open')) {
            label.textContent = 'Market open — next: ' + nextEvent.name.toLowerCase() + ' in ' + mins + 'm';
          } else if (phase.includes('Prime')) {
            label.textContent = 'Prime window — ' + mins + ' min remaining';
          } else {
            label.textContent = phase.toLowerCase() + ' — next: ' + nextEvent.name.toLowerCase() + ' in ' + mins + 'm';
          }

          // Progress bar (0-100% of time until next event)
          const pct = Math.max(0, Math.min(100, 100 - (state.diffSecs / (state.nextEventSecs > state.totalSecs ? state.nextEventSecs - state.totalSecs + 1 : 24 * 3600)) * 100));
          bar.style.width = pct + '%';
          bar.style.background = getClockColor(phase);

          // Update window badges
          renderWindowBadges(totalMins);
        }

        function renderWindowBadges(totalMins) {
          const container = document.getElementById('window-badges');
          const idealStart = getTimeInMinutes(windows.ideal.start);
          const idealEnd = getTimeInMinutes(windows.ideal.end);
          const notradeStart = getTimeInMinutes(windows.notrade.start);
          const notradeEnd = getTimeInMinutes(windows.notrade.end);

          const idealActive = totalMins >= idealStart && totalMins < idealEnd;
          const notradeActive = totalMins >= notradeStart && totalMins < notradeEnd;

          // Get initial visibility state from localStorage
          const visibility = JSON.parse(localStorage.getItem('windowVisibility')) || {
            ideal: true,
            notrade: true
          };

          const badges = `
            <button id="badge-ideal" style="font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 6px; 
              background: ${idealActive ? 'rgba(44,182,125,0.15)' : 'rgba(255,255,255,0.05)'}; 
              color: ${idealActive ? '#2cb67d' : 'rgba(255,255,255,0.35)'}; 
              border: 1px solid ${visibility.ideal ? 'rgba(44,182,125,0.3)' : 'rgba(255,255,255,0.1)'}; 
              cursor: pointer; transition: all 0.2s;"
              title="Click to toggle Ideal Window fields">
              Ideal Window${idealActive ? ' ●' : ''} ${visibility.ideal ? '✓' : ''}
            </button>
            <button id="badge-notrade" style="font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 6px; 
              background: ${notradeActive ? 'rgba(239,69,101,0.1)' : 'rgba(255,255,255,0.05)'}; 
              color: ${notradeActive ? '#ef4565' : 'rgba(255,255,255,0.35)'}; 
              border: 1px solid ${visibility.notrade ? 'rgba(239,69,101,0.3)' : 'rgba(255,255,255,0.1)'}; 
              cursor: pointer; transition: all 0.2s;"
              title="Click to toggle NO TRADE Window fields">
              NO TRADE${notradeActive ? ' ●' : ''} ${visibility.notrade ? '✓' : ''}
            </button>
          `;

          container.innerHTML = badges;

          // Add event listeners to badges
          document.getElementById('badge-ideal').addEventListener('click', function() {
            visibility.ideal = !visibility.ideal;
            localStorage.setItem('windowVisibility', JSON.stringify(visibility));
            toggleWindowSection('ideal', visibility.ideal);
            renderWindowBadges(totalMins);
          });

          document.getElementById('badge-notrade').addEventListener('click', function() {
            visibility.notrade = !visibility.notrade;
            localStorage.setItem('windowVisibility', JSON.stringify(visibility));
            toggleWindowSection('notrade', visibility.notrade);
            renderWindowBadges(totalMins);
          });

          // Apply initial visibility
          toggleWindowSection('ideal', visibility.ideal);
          toggleWindowSection('notrade', visibility.notrade);
        }

        function toggleWindowSection(type, visible) {
          let sectionId;
          if (type === 'ideal') {
            sectionId = 'ideal-section';
          } else if (type === 'notrade') {
            sectionId = 'notrade-section';
          }
          
          const section = document.getElementById(sectionId);
          if (section) {
            section.style.display = visible ? 'block' : 'none';
          }
        }

        // Initialize window inputs from localStorage
        function initWindowInputs() {
          document.getElementById('idealStart').value = windows.ideal.start;
          document.getElementById('idealEnd').value = windows.ideal.end;
          document.getElementById('notradeStart').value = windows.notrade.start;
          document.getElementById('notradeEnd').value = windows.notrade.end;
        }

        // Autosave on field blur
        function attachAutosaveListeners() {
          const fields = ['idealStart', 'idealEnd', 'notradeStart', 'notradeEnd'];
          fields.forEach(fieldId => {
            const field = document.getElementById(fieldId);
            if (field) {
              field.addEventListener('blur', function() {
                const idealStart = document.getElementById('idealStart').value;
                const idealEnd = document.getElementById('idealEnd').value;
                const notradeStart = document.getElementById('notradeStart').value;
                const notradeEnd = document.getElementById('notradeEnd').value;

                // Validate
                if (idealStart && idealEnd && notradeStart && notradeEnd) {
                  if (idealStart < idealEnd && notradeStart < notradeEnd) {
                    windows = {
                      ideal: { start: idealStart, end: idealEnd },
                      notrade: { start: notradeStart, end: notradeEnd }
                    };
                    localStorage.setItem('tradingWindows', JSON.stringify(windows));
                    renderWindowBadges(getCountdownToNextEvent().totalMins);
                  }
                }
              });
            }
          });
        }

        // Initial render
        initWindowInputs();
        attachAutosaveListeners();
        renderTimer();
        renderWindowBadges(getCountdownToNextEvent().totalMins);

        // Update every second
        setInterval(() => {
          renderTimer();
        }, 1000);
      }

      renderTimerApp();
    </script>

    <!-- POSITION CALCULATOR SECTION -->
    <div style="margin-top: 48px; width: 100%; max-width: 600px; margin-left: auto; margin-right: auto;">
      <div style="text-align: center; margin-bottom: 24px;">
        <div style="font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px;">Position Calculator</div>
        <div style="font-size: 12px; color: #aaa;">Risk/reward sizing &amp; scalability</div>
      </div>

      <div style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 24px; display: grid; gap: 20px;">
        
        <!-- Row 1: Account & Risk -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div>
            <label style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: #aaa; display: block; margin-bottom: 6px;">Account Size</label>
            <input type="number" id="accountSize" placeholder="25000" min="0" step="1" style="width: 100%; padding: 10px 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-size: 14px;">
          </div>
          <div>
            <label style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: #aaa; display: block; margin-bottom: 6px;">Max Daily Risk ($)</label>
            <input type="number" id="maxDailyRisk" placeholder="50" min="0" step="1" style="width: 100%; padding: 10px 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-size: 14px;">
          </div>
        </div>

        <!-- Row 2: Entry, Stop, Target -->
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
          <div>
            <label style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: #aaa; display: block; margin-bottom: 6px;">Entry ($)</label>
            <input type="number" id="entry" placeholder="4.50" min="0" step="0.01" style="width: 100%; padding: 10px 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-size: 14px;">
          </div>
          <div>
            <label style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: #aaa; display: block; margin-bottom: 6px;">Stop ($)</label>
            <input type="number" id="stop" placeholder="4.20" min="0" step="0.01" style="width: 100%; padding: 10px 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-size: 14px;">
          </div>
          <div>
            <label style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: #aaa; display: block; margin-bottom: 6px;">Target ($)</label>
            <input type="number" id="target" placeholder="5.50" min="0" step="0.01" style="width: 100%; padding: 10px 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-size: 14px;">
          </div>
        </div>

        <!-- Calculate Button -->
        <button id="calcBtn" style="padding: 12px 24px; background: linear-gradient(135deg, #ff6b6b, #ffd93d); color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; transition: all 0.2s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">Calculate</button>

        <!-- Results Section -->
        <div id="results" style="display: none; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 16px; display: grid; gap: 12px;">
          
          <!-- Core Position Sizing -->
          <div style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 12px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; font-size: 12px;">
              <div>
                <div style="color: #aaa; margin-bottom: 3px;">Position Size</div>
                <div style="font-size: 16px; font-weight: 700; color: #2cb67d;" id="resultShares">— shares</div>
              </div>
              <div>
                <div style="color: #aaa; margin-bottom: 3px;">Position Value</div>
                <div style="font-size: 16px; font-weight: 700; color: #2cb67d;" id="resultPosValue">$—</div>
              </div>
              <div>
                <div style="color: #aaa; margin-bottom: 3px;">Max Loss</div>
                <div style="font-size: 16px; font-weight: 700; color: #ef4565;" id="resultMaxLoss">$—</div>
              </div>
              <div>
                <div style="color: #aaa; margin-bottom: 3px;">Potential Gain</div>
                <div style="font-size: 16px; font-weight: 700; color: #2cb67d;" id="resultGain">$—</div>
              </div>
            </div>
          </div>

          <!-- Risk/Reward Ratio -->
          <div style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 12px;">
            <div style="font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; margin-bottom: 8px;">Risk / Reward</div>
            <div style="font-size: 14px; font-weight: 700; color: #ffd93d;" id="resultRR">—</div>
          </div>

          <!-- Scalability Multipliers -->
          <div>
            <div style="font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; margin-bottom: 8px;">Scalability (gain at 2x / 5x / 10x)</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
              <div style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 10px; text-align: center;">
                <div style="font-size: 10px; color: #aaa; margin-bottom: 4px;">2x Entry</div>
                <div style="font-size: 14px; font-weight: 700; color: #2cb67d;" id="scale2x">$—</div>
              </div>
              <div style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 10px; text-align: center;">
                <div style="font-size: 10px; color: #aaa; margin-bottom: 4px;">5x Entry</div>
                <div style="font-size: 14px; font-weight: 700; color: #2cb67d;" id="scale5x">$—</div>
              </div>
              <div style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; padding: 10px; text-align: center;">
                <div style="font-size: 10px; color: #aaa; margin-bottom: 4px;">10x Entry</div>
                <div style="font-size: 14px; font-weight: 700; color: #2cb67d;" id="scale10x">$—</div>
              </div>
            </div>
          </div>

        </div>

      </div>
    </div>

    <script>
      // Position Calculator Logic
      const calcBtn = document.getElementById('calcBtn');
      const resultsDiv = document.getElementById('results');

      calcBtn.addEventListener('click', function() {
        const accountSize = parseFloat(document.getElementById('accountSize').value) || 0;
        const maxDailyRisk = parseFloat(document.getElementById('maxDailyRisk').value) || 0;
        const entry = parseFloat(document.getElementById('entry').value) || 0;
        const stop = parseFloat(document.getElementById('stop').value) || 0;
        const target = parseFloat(document.getElementById('target').value) || 0;

        // Validation
        if (!accountSize || !entry || !stop || !target) {
          alert('Fill in Account Size, Entry, Stop, and Target');
          return;
        }

        if (entry <= stop) {
          alert('Entry must be higher than Stop');
          return;
        }

        if (target <= entry) {
          alert('Target must be higher than Entry');
          return;
        }

        // Core calculations
        const riskPerShare = entry - stop;
        const rewardPerShare = target - entry;
        const shares = maxDailyRisk > 0 ? Math.floor(maxDailyRisk / riskPerShare) : 0;
        const positionValue = shares * entry;
        const maxLoss = shares * riskPerShare;
        const potentialGain = shares * rewardPerShare;
        const rr = (rewardPerShare / riskPerShare).toFixed(2);

        // Scalability: show gain if price moves to 2x, 5x, 10x the entry
        const scale2x = shares * (entry * 2 - entry);
        const scale5x = shares * (entry * 5 - entry);
        const scale10x = shares * (entry * 10 - entry);

        // Update results
        document.getElementById('resultShares').textContent = shares.toLocaleString() + ' shares';
        document.getElementById('resultPosValue').textContent = '$' + positionValue.toFixed(2);
        document.getElementById('resultMaxLoss').textContent = '$' + maxLoss.toFixed(2);
        document.getElementById('resultGain').textContent = '$' + potentialGain.toFixed(2);
        document.getElementById('resultRR').textContent = '1 : ' + rr;
        document.getElementById('scale2x').textContent = '$' + scale2x.toFixed(2);
        document.getElementById('scale5x').textContent = '$' + scale5x.toFixed(2);
        document.getElementById('scale10x').textContent = '$' + scale10x.toFixed(2);

        // Show results
        resultsDiv.style.display = 'grid';
      });

      // Enter key to calculate
      document.querySelectorAll('#accountSize, #maxDailyRisk, #entry, #stop, #target').forEach(input => {
        input.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') calcBtn.click();
        });
      });
    </script>
